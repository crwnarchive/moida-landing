<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모이다 스크린샷 1 — 모임홈</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  background: #0a0a0a;
  color: #fff;
  padding: 40px 20px;
}
h1 { text-align: center; margin-bottom: 10px; font-size: 28px; }
.subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  max-width: 1500px;
  margin: 0 auto;
}

/* ── Each screenshot: 1290x2796 ── */
.shot {
  aspect-ratio: 1290 / 2796;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 0 3%;
}

/* ── Backgrounds ── */
.shot-1 { background: linear-gradient(175deg, #091428 0%, #0E2348 30%, #132F5E 60%, #1A4080 100%); }
.shot-2 { background: linear-gradient(175deg, #10082B 0%, #1A0E45 30%, #2B1869 65%, #3D2290 100%); }
.shot-3 { background: linear-gradient(175deg, #041A1A 0%, #082E2E 30%, #0E4545 65%, #186B60 100%); }
.shot-4 { background: linear-gradient(175deg, #1A082E 0%, #2D1050 30%, #451B7A 65%, #5E28A0 100%); }
.shot-5 { background: linear-gradient(175deg, #081E38 0%, #0E2B4A 30%, #1A4268 65%, #2460A0 100%); }
.shot-6 { background: linear-gradient(175deg, #0A1F2D 0%, #0F2D3D 30%, #164555 65%, #206B6B 100%); }

/* ── Ambient glow ── */
.shot::before {
  content: '';
  position: absolute;
  width: 60%;
  height: 30%;
  top: 40%;
  left: 20%;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.25;
  z-index: 0;
}
.shot-1::before { background: radial-gradient(circle, #3B82F6, transparent 70%); }
.shot-2::before { background: radial-gradient(circle, #8B5CF6, transparent 70%); }
.shot-3::before { background: radial-gradient(circle, #00D2C8, transparent 70%); }
.shot-4::before { background: radial-gradient(circle, #A855F7, transparent 70%); }
.shot-5::before { background: radial-gradient(circle, #3B82F6, transparent 70%); }
.shot-6::before { background: radial-gradient(circle, #14B8A6, transparent 70%); }

/* ── Caption area (top) ── */
.caption {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 8% 8% 4%;
  flex-shrink: 0;
}
.caption .tag {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.58em;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  margin-bottom: 5%;
  letter-spacing: 0.03em;
}
.caption h2 {
  font-size: 1.55em;
  font-weight: 800;
  line-height: 1.35;
  letter-spacing: -0.03em;
  margin-bottom: 3%;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.caption p {
  font-size: 0.62em;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  line-height: 1.5;
}

/* ── Phone: FULL device with bottom rounding ── */
.phone-wrap {
  position: relative;
  z-index: 2;
  width: 76%;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.phone {
  flex: 1;
  background: #fff;
  border-radius: 32px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 8px 60px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,0.06),
    0 0 120px rgba(59,130,246,0.08);
  position: relative;
}

/* ── Dynamic Island ── */
.dynamic-island {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 20px;
  background: #000;
  border-radius: 16px;
  z-index: 10;
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 22px 4px;
  font-size: 0.62em;
  font-weight: 600;
  background: #fff;
  flex-shrink: 0;
}
.status-bar .time { font-weight: 700; }
.status-icons { display: flex; gap: 3px; align-items: center; }
.status-icons svg { width: 12px; height: 12px; }

/* ── App bar ── */
.app-bar {
  display: flex;
  align-items: center;
  padding: 6px 14px 6px;
  background: #fff;
  flex-shrink: 0;
}
.app-bar .back { font-size: 1em; color: #333; margin-right: 6px; }
.app-bar .title { font-size: 0.78em; font-weight: 700; color: #1a1a1a; flex: 1; }
.app-bar .actions { display: flex; gap: 6px; font-size: 0.9em; }

/* ── Content area ── */
.content {
  flex: 1;
  overflow: hidden;
  background: #f5f5f7;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════
   BOTTOM NAV — BIG & CLEAR (5 tabs)
   ══════════════════════════════════════ */
.bottom-nav {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 4px 16px;
  background: #fff;
  border-top: 1px solid #eee;
  flex-shrink: 0;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-size: 0.48em;
  color: #aaa;
  font-weight: 500;
  min-width: 44px;
}
.nav-item.active .nav-label {
  background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}
.nav-icon-wrap {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1em;
}
.nav-item.active .nav-icon-wrap {
  background: linear-gradient(135deg, rgba(0,210,200,0.12), rgba(49,130,246,0.12), rgba(139,92,246,0.08));
  border-radius: 14px;
  width: 44px;
}
/* Home bar indicator */
.home-indicator {
  width: 100px;
  height: 4px;
  background: #ccc;
  border-radius: 2px;
  margin: 0 auto 4px;
}

/* ── Cards ── */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 12px 14px;
  margin: 0 12px 8px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.card-title {
  font-size: 0.63em;
  font-weight: 700;
  color: #1a1a1a;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-more { font-size: 0.5em; color: #3182F6; font-weight: 600; }

/* ── Group banner ── */
.group-banner {
  margin: 0 12px 8px;
  padding: 14px 16px;
  border-radius: 14px;
  background: linear-gradient(135deg, #00D2C8 0%, #3182F6 50%, #8B5CF6 100%);
  color: #fff;
}
.group-banner .gname { font-size: 0.78em; font-weight: 800; margin-bottom: 4px; }
.group-banner .gmeta { display: flex; justify-content: space-between; align-items: center; }
.group-banner .member-cnt {
  font-size: 0.52em; background: rgba(255,255,255,0.25);
  padding: 2px 10px; border-radius: 12px;
}
.group-banner .role-badge {
  font-size: 0.48em; background: rgba(255,255,255,0.2);
  padding: 3px 10px; border-radius: 10px;
}

/* ── Fee items ── */
.fee-item { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
.fee-item:last-child { border-bottom: none; }
.fee-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
  margin-right: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 0.5em; font-weight: 700; color: #4f46e5;
}
.fee-name { font-size: 0.58em; font-weight: 600; color: #333; flex: 1; }
.fee-status { font-size: 0.48em; font-weight: 700; padding: 2px 8px; border-radius: 8px; }
.fee-paid { background: #ecfdf5; color: #059669; }
.fee-pending { background: #fef3c7; color: #d97706; }
.fee-unpaid { background: #fee2e2; color: #dc2626; }

/* ── Feed ── */
.feed-post { background: #fff; margin: 0 12px 8px; border-radius: 14px; overflow: hidden; }
.feed-post-header { display: flex; align-items: center; padding: 10px 12px 6px; gap: 7px; }
.feed-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #00D2C8, #3182F6);
  flex-shrink: 0;
}
.feed-author { font-size: 0.58em; font-weight: 700; color: #333; }
.feed-time { font-size: 0.44em; color: #999; }
.feed-text { padding: 0 12px 8px; font-size: 0.54em; color: #444; line-height: 1.5; }
.feed-image {
  width: calc(100% - 24px); margin: 0 12px 8px;
  height: 80px; border-radius: 10px;
}
.feed-actions { display: flex; padding: 4px 12px 8px; gap: 14px; }
.feed-action { font-size: 0.44em; color: #888; display: flex; align-items: center; gap: 3px; }

/* ── Poll ── */
.poll-card { background: #fff; margin: 0 12px 8px; border-radius: 14px; padding: 12px 14px; }
.poll-question { font-size: 0.62em; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.poll-option {
  background: #f5f5f7; border-radius: 10px; padding: 9px 10px;
  margin-bottom: 5px; position: relative; overflow: hidden;
}
.poll-option-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 10px; }
.poll-option-text {
  position: relative; z-index: 1; display: flex;
  justify-content: space-between; font-size: 0.52em; font-weight: 600; color: #333;
}
.poll-meta { font-size: 0.44em; color: #999; margin-top: 6px; }

/* ── Calendar ── */
.cal-month { text-align: center; font-size: 0.68em; font-weight: 700; color: #1a1a1a; padding: 8px 0 4px; }
.cal-days {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 12px; text-align: center; font-size: 0.42em; color: #999; margin-bottom: 2px;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 12px; text-align: center; font-size: 0.46em;
}
.cal-cell { padding: 4px 2px; color: #333; position: relative; }
.cal-cell.today { font-weight: 800; color: #3182F6; }
.cal-cell .dot { width: 3px; height: 3px; border-radius: 50%; margin: 1px auto 0; }
.cal-cell .dot.blue { background: #3182F6; }
.cal-cell .dot.red { background: #ef4444; }
.cal-cell .dot.green { background: #10b981; }
.cal-event {
  display: flex; align-items: center; padding: 7px 10px;
  margin: 3px 12px; background: #fff; border-radius: 10px; gap: 7px;
}
.cal-event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cal-event-text { font-size: 0.52em; font-weight: 600; color: #333; }
.cal-event-date { font-size: 0.42em; color: #999; }

/* ── Ledger ── */
.ledger-summary { display: flex; gap: 6px; margin: 0 12px 8px; }
.ledger-box { flex: 1; background: #fff; border-radius: 12px; padding: 10px; text-align: center; }
.ledger-label { font-size: 0.44em; color: #999; margin-bottom: 2px; }
.ledger-amount { font-size: 0.68em; font-weight: 800; }
.ledger-amount.blue { color: #3182F6; }
.ledger-amount.red { color: #ef4444; }
.ledger-amount.green { color: #10b981; }
.ledger-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
.ledger-row:last-child { border-bottom: none; }
.ledger-row-icon {
  width: 28px; height: 28px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-right: 8px; font-size: 0.65em;
}
.ledger-row-text { flex: 1; }
.ledger-row-title { font-size: 0.52em; font-weight: 600; color: #333; }
.ledger-row-date { font-size: 0.42em; color: #999; }
.ledger-row-amount { font-size: 0.58em; font-weight: 700; }


/* Single shot overrides */
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 0;
  margin: 0;
  background: #000;
}
.shot {
  width: 1290px;
  height: 2796px;
  border-radius: 0;
}
</style>
</head>
<body>
<!-- ══════════ 1. 모임홈 ══════════ -->
<div class="shot shot-1">
  <div class="caption">
    <div class="tag">모임 관리</div>
    <h2>모임의 모든 것,<br>한눈에</h2>
    <p>공지 · 일정 · 회비 · 경조사까지</p>
  </div>
  <div class="phone-wrap">
    <div class="phone">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 16" fill="#000"><rect x="1" y="10" width="3" height="5" rx=".5"/><rect x="5" y="7" width="3" height="8" rx=".5"/><rect x="9" y="4" width="3" height="11" rx=".5"/><rect x="13" y="1" width="3" height="14" rx=".5"/></svg>
          <svg viewBox="0 0 24 12" fill="none"><rect x=".5" y=".5" width="20" height="11" rx="2" stroke="#000"/><rect x="2" y="2" width="14" height="7" rx="1" fill="#000"/><path d="M22 4v4a2 2 0 000-4z" fill="#000"/></svg>
        </div>
      </div>
      <div class="app-bar">
        <span class="back">←</span>
        <span class="title">한국고 32기 동창회</span>
        <div class="actions">🔔 ⚙️</div>
      </div>
      <div class="content" style="padding-top:6px;">
        <div class="group-banner">
          <div class="gname">한국고 32기 동창회</div>
          <div class="gmeta">
            <span class="member-cnt">회원 24명 ›</span>
            <span class="role-badge">총무</span>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 2026년 6월 회비</span>
            <span style="font-size:0.48em;color:#333;">›</span>
          </div>
          <div style="display:flex;gap:16px;font-size:0.52em;">
            <span style="color:#059669;font-weight:700;">18명 납부</span>
            <span style="color:#d97706;font-weight:600;">4명 확인중</span>
            <span style="color:#dc2626;font-weight:600;">2명 미납</span>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📢 최근 공지</span>
            <span class="card-more">더보기</span>
          </div>
          <div style="font-size:0.52em;color:#444;">6월 정기모임 장소 변경 안내</div>
          <div style="font-size:0.42em;color:#aaa;margin-top:2px;">28분 전</div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📅 다가오는 일정</span>
            <span class="card-more">더보기</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:7px;">
            <div style="display:flex;align-items:center;gap:7px;">
              <span style="background:#fee2e2;color:#dc2626;font-size:0.52em;font-weight:800;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;">8</span>
              <div><div style="font-size:0.52em;font-weight:600;color:#333;">[조사] 김OO 조부상</div><div style="font-size:0.42em;color:#999;">6/8 · 종일</div></div>
            </div>
            <div style="display:flex;align-items:center;gap:7px;">
              <span style="background:#e0f2fe;color:#3182F6;font-size:0.52em;font-weight:800;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;">13</span>
              <div><div style="font-size:0.52em;font-weight:600;color:#333;">정기모임</div><div style="font-size:0.42em;color:#999;">6/13 · 10:00</div></div>
            </div>
            <div style="display:flex;align-items:center;gap:7px;">
              <span style="background:#fef3c7;color:#d97706;font-size:0.52em;font-weight:800;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;">16</span>
              <div><div style="font-size:0.52em;font-weight:600;color:#333;">[경사] 홍길동 결혼식</div><div style="font-size:0.42em;color:#999;">6/16 · 종일</div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon-wrap">🏠</div><span class="nav-label">홈</span></div>
        <div class="nav-item"><div class="nav-icon-wrap">📢</div><span>소식</span></div>
        <div class="nav-item"><div class="nav-icon-wrap">📰</div><span>피드</span></div>
        <div class="nav-item"><div class="nav-icon-wrap">📅</div><span>캘린더</span></div>
        <div class="nav-item"><div class="nav-icon-wrap">💰</div><span>회비</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
