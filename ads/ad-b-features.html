<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  width: 1080px; height: 1080px;
  background: #0D1117;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.orb1 { position: absolute; width: 600px; height: 600px; background: #3182F6; border-radius: 50%; filter: blur(120px); opacity: 0.15; top: -10%; right: -15%; }
.orb2 { position: absolute; width: 500px; height: 500px; background: #00D2C8; border-radius: 50%; filter: blur(100px); opacity: 0.15; bottom: -10%; left: -10%; }

.content { position: relative; z-index: 1; text-align: center; padding: 60px; }

h1 {
  font-size: 58px; font-weight: 800; color: #F0F6FC;
  line-height: 1.3; letter-spacing: -2px; margin-bottom: 16px;
}
h1 .gradient {
  background: linear-gradient(90deg, #00D2C8, #3182F6, #8B5CF6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 24px; color: #8B949E; font-weight: 500;
  margin-bottom: 56px;
}

.features-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-bottom: 56px; text-align: left;
}
.feature-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 28px;
}
.feature-card .icon { font-size: 36px; margin-bottom: 12px; display: block; }
.feature-card .name { font-size: 24px; font-weight: 800; color: #F0F6FC; margin-bottom: 4px; }
.feature-card .desc { font-size: 16px; color: #8B949E; line-height: 1.5; }

.bottom {
  display: flex; align-items: center; justify-content: center; gap: 24px;
}
.download-btn {
  background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
  color: #fff; font-size: 24px; font-weight: 800;
  padding: 18px 40px; border-radius: 16px;
  display: flex; align-items: center; gap: 10px;
}
.download-btn svg { width: 24px; height: 24px; fill: #fff; }
.free-badge {
  font-size: 20px; font-weight: 700; color: #00D2C8;
  border: 2px solid #00D2C8; padding: 14px 28px; border-radius: 16px;
}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="content">
  <h1><span class="gradient">모임 운영</span>,<br>흩어진 걸 하나로</h1>
  <div class="subtitle">회비부터 일정까지, 모임의 모든 것</div>

  <div class="features-grid">
    <div class="feature-card">
      <span class="icon">💰</span>
      <div class="name">회비 관리</div>
      <div class="desc">누가 냈는지 한눈에</div>
    </div>
    <div class="feature-card">
      <span class="icon">📋</span>
      <div class="name">피드</div>
      <div class="desc">사진, 댓글, 대댓글</div>
    </div>
    <div class="feature-card">
      <span class="icon">🗳️</span>
      <div class="name">투표</div>
      <div class="desc">3초면 의견 수집</div>
    </div>
    <div class="feature-card">
      <span class="icon">📅</span>
      <div class="name">캘린더</div>
      <div class="desc">일정 놓치지 않게</div>
    </div>
  </div>

  <div class="bottom">
    <div class="download-btn">
      <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store 다운로드
    </div>
    <div class="free-badge">완전 무료</div>
  </div>
</div>
</body>
</html>
