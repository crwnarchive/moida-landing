<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1080px;height:1350px;
  overflow:hidden;
  position:relative;
}
</style>
</head>
<body>

<div style="width:1080px;height:1350px;background:linear-gradient(180deg,#FF6B6B 0%,#ee5a5a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px;position:relative">
  
  <div style="font-size:60px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:40px">모이다</div>
  
  <div style="font-size:48px;font-weight:800;color:#fff;line-height:1.4;margin-bottom:20px">
    회비부터 일정까지,<br>
    모임의 모든 것
  </div>
  
  <div style="font-size:28px;color:rgba(255,255,255,0.8);line-height:1.6;margin-bottom:60px">
    동창회 · 동호회 · 소모임 · 학생회<br>
    지금 바로 시작하세요
  </div>
  
  <div style="display:flex;gap:20px;margin-bottom:60px">
    <div style="background:#fff;border-radius:16px;padding:16px 36px;display:flex;align-items:center;gap:12px;font-size:22px;font-weight:700;color:#333">
      <span style="font-size:26px">▶</span> Google Play
    </div>
    <div style="background:#fff;border-radius:16px;padding:16px 36px;display:flex;align-items:center;gap:12px;font-size:22px;font-weight:700;color:#333">
      <span style="font-size:26px">🍎</span> App Store
    </div>
  </div>
  
  <div style="font-size:24px;color:rgba(255,255,255,0.6);margin-top:20px">
    무료 다운로드 · 수수료 없음
  </div>
</div>

</body>
</html>
