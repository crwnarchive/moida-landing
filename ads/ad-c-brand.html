<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  width: 1080px; height: 1080px;
  background: linear-gradient(160deg, #00D2C8 0%, #3182F6 50%, #8B5CF6 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
/* White translucent orbs for depth */
.orb1 { position: absolute; width: 500px; height: 500px; background: rgba(255,255,255,0.1); border-radius: 50%; filter: blur(80px); top: -15%; left: -10%; }
.orb2 { position: absolute; width: 400px; height: 400px; background: rgba(255,255,255,0.08); border-radius: 50%; filter: blur(60px); bottom: -10%; right: -5%; }

.content { position: relative; z-index: 1; text-align: center; padding: 60px; }

.app-icon {
  width: 120px; height: 120px; border-radius: 28px;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(20px);
  border: 2px solid rgba(255,255,255,0.3);
  margin: 0 auto 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
}

h1 {
  font-size: 72px; font-weight: 800; color: #fff;
  line-height: 1.2; letter-spacing: -3px; margin-bottom: 20px;
}

.subtitle {
  font-size: 28px; color: rgba(255,255,255,0.85); font-weight: 500;
  margin-bottom: 56px; line-height: 1.5;
}

.tags {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 56px;
}
.tag {
  background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 22px; font-weight: 700;
  padding: 12px 24px; border-radius: 30px;
}

.cta-btn {
  display: inline-flex; align-items: center; gap: 12px;
  background: #fff; color: #3182F6;
  font-size: 28px; font-weight: 800;
  padding: 22px 48px; border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.cta-btn svg { width: 28px; height: 28px; fill: #3182F6; }

.free-note {
  margin-top: 20px; font-size: 20px; color: rgba(255,255,255,0.7); font-weight: 600;
}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="content">
  <div class="app-icon">🏠</div>
  <h1>모이다</h1>
  <div class="subtitle">모임 운영, 흩어진 걸 하나로<br>회비부터 일정까지 모임의 모든 것</div>

  <div class="tags">
    <span class="tag">💰 회비</span>
    <span class="tag">📋 피드</span>
    <span class="tag">🗳️ 투표</span>
    <span class="tag">📅 일정</span>
    <span class="tag">🎉 경조사</span>
  </div>

  <div class="cta-btn">
    <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    App Store에서 다운로드
  </div>
  <div class="free-note">✓ 완전 무료 · 광고 없음 · 3분이면 시작</div>
</div>
</body>
</html>
