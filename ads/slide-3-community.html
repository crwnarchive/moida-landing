<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1080px;height:1350px;
  overflow:hidden;
  position:relative;
}
</style>
</head>
<body>

<div style="width:1080px;height:1350px;background:linear-gradient(180deg,#f8f8f8 0%,#f0f0f0 100%);display:flex;flex-direction:column;padding:80px 60px;position:relative;overflow:hidden">
  
  <div style="display:flex;flex:1">
    <!-- Left: text -->
    <div style="width:400px;padding-top:20px;flex-shrink:0">
      <div style="font-size:22px;font-weight:700;color:#8B5CF6;margin-bottom:16px">피드 · 투표</div>
      <div style="font-size:44px;font-weight:800;color:#191F28;line-height:1.4;letter-spacing:-1px">
        모임 안에서<br>
        <span style="color:#8B5CF6">자유롭게</span> 소통하고,<br>
        빠르게 결정하세요.
      </div>
      <div style="font-size:24px;color:#6B7684;line-height:1.7;margin-top:32px">
        사진, 글, 댓글, 대댓글로<br>
        우리끼리 소통하는 공간.
      </div>
      <div style="font-size:24px;margin-top:24px;line-height:1.7">
        일정, 장소, 메뉴까지<br>
        <span style="color:#8B5CF6;font-weight:700">투표로 빠르게 결정</span>하세요.
      </div>
    </div>
    
    <!-- Right: 2 phones stacked/overlapping -->
    <div style="flex:1;position:relative;padding-left:20px">
      <!-- Phone 1: Feed (behind, slightly up) -->
      <div style="position:absolute;top:0;right:40px;width:380px;background:#fff;border-radius:32px;box-shadow:0 16px 48px rgba(0,0,0,0.1);overflow:hidden;transform:rotate(2deg)">
        <div style="width:72px;height:20px;background:#000;border-radius:10px;margin:8px auto 4px"></div>
        <div style="padding:6px 18px 4px;font-size:11px;font-weight:600;display:flex;justify-content:space-between"><span>9:41</span><span>📶 🔋</span></div>
        <div style="padding:4px 16px 6px;font-size:15px;font-weight:700;display:flex;justify-content:space-between"><span>피드</span><span style="font-size:14px">✏️</span></div>
        <div style="padding:0 14px 14px;background:#F5F5F7">
          <div style="background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden">
            <div style="display:flex;align-items:center;padding:10px 12px 6px;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00D2C8,#3182F6)"></div><div><div style="font-size:12px;font-weight:700">김민수</div><div style="font-size:9px;color:#8B95A1">2시간 전</div></div></div>
            <div style="padding:0 12px 8px;font-size:12px;color:#333;line-height:1.5">지난주 정기모임 사진 공유합니다! 🎉</div>
            <div style="margin:0 12px 8px;height:90px;background:linear-gradient(135deg,#a7f3d0,#6ee7b7);border-radius:8px"></div>
            <div style="padding:2px 12px 8px;font-size:10px;color:#8B95A1;display:flex;gap:12px"><span>❤️ 12</span><span>💬 5</span></div>
          </div>
          <div style="background:#fff;border-radius:12px;overflow:hidden">
            <div style="display:flex;align-items:center;padding:10px 12px 6px;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#a78bfa)"></div><div><div style="font-size:12px;font-weight:700">이영희</div><div style="font-size:9px;color:#8B95A1">5시간 전</div></div></div>
            <div style="padding:0 12px 8px;font-size:12px;color:#333;line-height:1.5">다음 달 회식 장소 추천 받아요! 😊</div>
            <div style="padding:2px 12px 8px;font-size:10px;color:#8B95A1;display:flex;gap:12px"><span>❤️ 8</span><span>💬 14</span></div>
          </div>
        </div>
      </div>
      
      <!-- Phone 2: Poll (front, overlapping) -->
      <div style="position:absolute;top:380px;right:0;width:380px;background:#fff;border-radius:32px;box-shadow:0 16px 48px rgba(0,0,0,0.12);overflow:hidden;transform:rotate(-2deg)">
        <div style="width:72px;height:20px;background:#000;border-radius:10px;margin:8px auto 4px"></div>
        <div style="padding:6px 18px 4px;font-size:11px;font-weight:600;display:flex;justify-content:space-between"><span>9:41</span><span>📶 🔋</span></div>
        <div style="padding:4px 16px 6px;font-size:15px;font-weight:700"><span style="font-size:13px">←</span> 투표</div>
        <div style="padding:0 14px 14px;background:#F5F5F7">
          <div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#00D2C8,#3182F6)"></div><div><div style="font-size:11px;font-weight:700">총무 김민수</div><div style="font-size:9px;color:#8B95A1">진행 중</div></div></div>
            <div style="font-size:14px;font-weight:700;margin-bottom:10px">🗳️ 7월 정기모임 날짜</div>
            <div style="background:#F5F5F7;border-radius:10px;padding:10px 12px;margin-bottom:6px;position:relative;overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:55%;background:linear-gradient(90deg,rgba(0,210,200,0.15),rgba(49,130,246,0.15));border-radius:10px"></div><div style="position:relative;display:flex;justify-content:space-between;font-size:12px;font-weight:600"><span>7월 12일 (토)</span><span style="color:#3182F6">55%</span></div></div>
            <div style="background:#F5F5F7;border-radius:10px;padding:10px 12px;margin-bottom:6px;position:relative;overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:30%;background:rgba(139,92,246,0.1);border-radius:10px"></div><div style="position:relative;display:flex;justify-content:space-between;font-size:12px;font-weight:600"><span>7월 13일 (일)</span><span>30%</span></div></div>
            <div style="background:#F5F5F7;border-radius:10px;padding:10px 12px;position:relative;overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:15%;background:rgba(139,92,246,0.06);border-radius:10px"></div><div style="position:relative;display:flex;justify-content:space-between;font-size:12px;font-weight:600"><span>7월 19일 (토)</span><span>15%</span></div></div>
            <div style="font-size:10px;color:#8B95A1;margin-top:8px">20명 참여 · 3일 남음</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
