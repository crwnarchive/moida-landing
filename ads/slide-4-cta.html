<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;width:1080px;height:1350px;background:#F5F0EE;overflow:hidden;position:relative}
.phone{background:#fff;border-radius:28px;box-shadow:0 8px 40px rgba(0,0,0,0.12);overflow:hidden;position:absolute}
.di{width:60px;height:16px;background:#000;border-radius:10px;margin:6px auto 2px}
.sbar{display:flex;justify-content:space-between;padding:6px 16px 2px;font-size:10px;font-weight:600}
/* Floating cards that pop out of phone */
.float-card{position:absolute;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.12);padding:16px 18px;z-index:10}
.float-notif{position:absolute;background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:12px 16px;z-index:10;display:flex;align-items:center;gap:10px}
</style>
</head>
<body>

<div style="width:1080px;height:1350px;background:linear-gradient(135deg,#00D2C8 0%,#3182F6 50%,#8B5CF6 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px">
  
  <div style="font-size:56px;font-weight:900;color:#fff;letter-spacing:3px;margin-bottom:40px">모이다</div>
  
  <div style="font-size:42px;font-weight:800;color:#fff;line-height:1.4;margin-bottom:20px">
    회비부터 일정까지,<br>
    모임의 모든 것
  </div>
  
  <div style="font-size:22px;color:rgba(255,255,255,0.75);line-height:1.7;margin-bottom:48px">
    동창회 · 동호회 · 소모임 · 학생회 · 동아리<br>
    지금 바로 시작하세요
  </div>
  
  <div style="display:flex;gap:16px;margin-bottom:36px">
    <div style="background:#fff;border-radius:14px;padding:14px 32px;display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:#333">
      <span style="font-size:22px">🍎</span> App Store
    </div>
    <div style="background:#fff;border-radius:14px;padding:14px 32px;display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:#333">
      <span style="font-size:22px">▶</span> Google Play
    </div>
  </div>
  
  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:40px">
    <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;font-weight:600">✅ 회비 관리</div>
    <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;font-weight:600">✅ 피드 · 소통</div>
    <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;font-weight:600">✅ 투표</div>
    <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;font-weight:600">✅ 캘린더</div>
    <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;font-weight:600">✅ 장부</div>
    <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;font-weight:600">✅ 경조사</div>
  </div>
  
  <div style="font-size:18px;color:rgba(255,255,255,0.5)">무료 다운로드 · 수수료 없음</div>
</div>

</body>
</html>
