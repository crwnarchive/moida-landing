<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1080px;height:1080px;
  overflow:hidden;
}
</style>
</head>
<body>

<div style="width:1080px;height:1080px;background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px">
  
  <div style="font-size:72px;font-weight:900;color:#fff;line-height:1.3;letter-spacing:-2px">
    1번째 유저가<br>되어주세요
  </div>
  
  <div style="margin-top:24px;font-size:28px;color:rgba(255,255,255,0.7);font-weight:500;letter-spacing:-0.5px">
    솔직히 지금 깔면 OG입니다
  </div>
  
  <div style="margin-top:56px;display:flex;gap:16px">
    <div style="background:#fff;border-radius:14px;padding:16px 32px;display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:#333">
      🍎 App Store
    </div>
    <div style="position:relative">
      <div style="background:#fff;border-radius:14px;padding:16px 32px;display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:#333">
        ▶ Google Play
      </div>
      <div style="position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:8px;white-space:nowrap">
        <div style="font-size:14px;color:rgba(255,255,255,0.5);font-weight:500">
          (곧 출시합니다 아마 곧...)
        </div>
      </div>
    </div>
  </div>
  
  <div style="margin-top:64px;font-size:20px;color:rgba(255,255,255,0.5)">
    모임 회비 · 피드 · 투표 · 캘린더 · 장부
  </div>
</div>

</body>
</html>
