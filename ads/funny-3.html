<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1080px;height:1080px;
  overflow:hidden;
}
</style>
</head>
<body>

<div style="width:1080px;height:1080px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px">
  
  <div style="font-size:72px;font-weight:900;color:#191F28;line-height:1.3;letter-spacing:-2px">
    총무가 울면서<br>감사한 앱
  </div>
  
  <div style="margin-top:32px;position:relative;display:inline-block">
    <div style="font-size:28px;color:#8B95A1;font-weight:500;letter-spacing:-0.5px">
      이 될 예정입니다 아마도
    </div>
    <div style="position:absolute;top:50%;left:-4px;right:-4px;height:2px;background:#8B95A1"></div>
  </div>
  
  <div style="margin-top:64px;display:flex;align-items:center;gap:12px">
    <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);display:flex;align-items:center;justify-content:center">
      <div style="font-size:24px;font-weight:900;color:#fff">M</div>
    </div>
    <div style="font-size:28px;font-weight:800;color:#191F28;letter-spacing:1px">모이다</div>
  </div>
</div>

</body>
</html>
