<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1080px;height:1350px;
  overflow:hidden;
  position:relative;
}
</style>
</head>
<body>

<div style="width:1080px;height:1350px;background:linear-gradient(180deg,#f8f8f8 0%,#f0f0f0 100%);display:flex;padding:80px 60px;position:relative;overflow:hidden">
  
  <!-- Left text -->
  <div style="width:420px;padding-top:20px;flex-shrink:0">
    <div style="font-size:22px;font-weight:700;color:#00D2C8;margin-bottom:16px">회비 관리</div>
    <div style="font-size:44px;font-weight:800;color:#191F28;line-height:1.4;letter-spacing:-1px">
      누가 냈는지<br>
      <span style="color:#00D2C8">한눈에</span> 확인하고,<br>
      깔끔하게 관리하세요.
    </div>
    <div style="font-size:24px;color:#6B7684;line-height:1.7;margin-top:32px">
      엑셀로 관리하던 회비 현황,<br>
      이제 앱에서 실시간으로<br>
      납부·미납을 확인하세요.
    </div>
    <div style="font-size:24px;margin-top:32px;line-height:1.7">
      <span style="color:#00D2C8;font-weight:700">가장 스마트한 선택</span>입니다.
    </div>
  </div>
  
  <!-- Right phone -->
  <div style="flex:1;display:flex;justify-content:center;align-items:flex-start;padding-top:40px">
    <div style="width:420px;background:#fff;border-radius:36px;box-shadow:0 20px 60px rgba(0,0,0,0.1);overflow:hidden">
      <div style="width:80px;height:22px;background:#000;border-radius:12px;margin:10px auto 4px"></div>
      <div style="padding:8px 20px 4px;font-size:12px;font-weight:600;display:flex;justify-content:space-between"><span>9:41</span><span>📶 🔋</span></div>
      <div style="padding:4px 18px 8px;font-size:17px;font-weight:700"><span style="font-size:14px">←</span> 2026년 6월 회비</div>
      <div style="padding:0 16px 16px;background:#F5F5F7">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1;background:#ecfdf5;border-radius:12px;padding:14px;text-align:center"><div style="font-size:11px;color:#059669">납부</div><div style="font-size:24px;font-weight:800;color:#059669">18</div></div>
          <div style="flex:1;background:#fef3c7;border-radius:12px;padding:14px;text-align:center"><div style="font-size:11px;color:#d97706">확인중</div><div style="font-size:24px;font-weight:800;color:#d97706">4</div></div>
          <div style="flex:1;background:#fee2e2;border-radius:12px;padding:14px;text-align:center"><div style="font-size:11px;color:#dc2626">미납</div><div style="font-size:24px;font-weight:800;color:#dc2626">2</div></div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:#8B95A1;font-weight:600">납부 18 / 전체 24명</span><span style="font-size:18px;font-weight:800">75%</span></div>
          <div style="height:12px;background:#F2F4F6;border-radius:6px;overflow:hidden"><div style="width:75%;height:100%;background:linear-gradient(90deg,#00D2C8,#3182F6);border-radius:6px"></div></div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:10px">
          <div style="font-size:13px;color:#8B95A1;font-weight:600">걷은 금액</div>
          <div style="font-size:20px;font-weight:800;color:#00D2C8;margin-top:6px">540,000원 <span style="color:#8B95A1;font-weight:600">/ 720,000원</span></div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">회원별 현황</div>
          <div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #F2F4F6"><div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#4f46e5;margin-right:10px">김</div><span style="flex:1;font-size:14px;font-weight:600">김민수</span><span style="font-size:11px;font-weight:700;background:#ecfdf5;color:#059669;padding:3px 10px;border-radius:8px">납부</span></div>
          <div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #F2F4F6"><div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#4f46e5;margin-right:10px">이</div><span style="flex:1;font-size:14px;font-weight:600">이영희</span><span style="font-size:11px;font-weight:700;background:#ecfdf5;color:#059669;padding:3px 10px;border-radius:8px">납부</span></div>
          <div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #F2F4F6"><div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#4f46e5;margin-right:10px">박</div><span style="flex:1;font-size:14px;font-weight:600">박지훈</span><span style="font-size:11px;font-weight:700;background:#fef3c7;color:#d97706;padding:3px 10px;border-radius:8px">확인중</span></div>
          <div style="display:flex;align-items:center;padding:8px 0"><div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#4f46e5;margin-right:10px">정</div><span style="flex:1;font-size:14px;font-weight:600">정태준</span><span style="font-size:11px;font-weight:700;background:#fee2e2;color:#dc2626;padding:3px 10px;border-radius:8px">미납</span></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-around;padding:10px 0 18px;border-top:1px solid #eee;font-size:10px;color:#8B95A1">
        <div style="text-align:center"><div style="font-size:14px">🏠</div>홈</div><div style="text-align:center"><div style="font-size:14px">📢</div>소식</div><div style="text-align:center"><div style="font-size:14px">📰</div>피드</div><div style="text-align:center"><div style="font-size:14px">📅</div>캘린더</div><div style="text-align:center"><div style="font-size:14px">💰</div><div style="font-weight:700;background:linear-gradient(135deg,#00D2C8,#3182F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">회비</div></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
