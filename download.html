<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모이다 다운로드</title>
<meta property="og:title" content="모이다 — 모임 운영, 흩어진 걸 하나로">
<meta property="og:description" content="회비부터 일정까지, 모임의 모든 것. 지금 다운로드하세요.">
<meta property="og:image" content="https://moida-landing.vercel.app/og-image.png">
<meta property="og:url" content="https://moida-landing.vercel.app/download">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }
  .container { max-width: 400px; }
  .icon { width: 96px; height: 96px; border-radius: 22px; margin-bottom: 24px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #999; font-size: 15px; margin-bottom: 32px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #333;
    border-top-color: #3182F6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .redirect-msg { color: #666; font-size: 13px; margin-bottom: 32px; }
  .fallback { display: none; }
  .btn {
    display: inline-block;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    margin: 8px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ios {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    color: #fff;
  }
  .btn-android {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #333;
  }
  .btn-android .soon { color: #666; font-size: 12px; }
</style>
<script>
(function() {
  var ios = 'https://apps.apple.com/kr/app/%EB%AA%A8%EC%9D%B4%EB%8B%A4/id6776201343';
  var android = 'https://play.google.com/store/apps/details?id=com.crwnarchive.moida';
  var ua = navigator.userAgent || '';

  // iOS → App Store
  if (/iPhone|iPad|iPod/i.test(ua)) {
    window.location.href = ios;
    return;
  }
  // Android → Play Store
  if (/Android/i.test(ua)) {
    window.location.href = android;
    return;
  }
  // PC/기타 → 폴백 UI 표시
  document.addEventListener('DOMContentLoaded', function() {
    var spinner = document.querySelector('.spinner');
    var msg = document.querySelector('.redirect-msg');
    var fallback = document.querySelector('.fallback');
    if (spinner) spinner.style.display = 'none';
    if (msg) msg.style.display = 'none';
    if (fallback) fallback.style.display = 'block';
  });
})();
</script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C7JZ36SGG4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C7JZ36SGG4');
</script>
</head>
<body>
<div class="container">
  <img src="/icon.png" alt="모이다" class="icon">
  <h1>모이다</h1>
  <p>회비부터 일정까지, 모임의 모든 것</p>

  <div class="spinner"></div>
  <div class="redirect-msg">스토어로 이동 중...</div>

  <div class="fallback">
    <a href="https://apps.apple.com/kr/app/%EB%AA%A8%EC%9D%B4%EB%8B%A4/id6776201343" class="btn btn-ios">
      App Store에서 다운로드
    </a>
    <br>
    <a href="https://play.google.com/store/apps/details?id=com.crwnarchive.moida" class="btn btn-android">
      Google Play에서 다운로드<br><span class="soon">(곧 출시합니다 아마 곧...)</span>
    </a>
  </div>
</div>
</body>
</html>
