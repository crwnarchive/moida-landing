<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    width: 1290px; height: 2796px;
    background: #F8F9FA;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  /* Caption area */
  .caption {
    padding-top: 160px; text-align: center; margin-bottom: 80px;
  }
  .caption h1 {
    font-size: 72px; font-weight: 800; color: #191F28;
    letter-spacing: -2px; line-height: 1.3;
  }
  .caption p {
    font-size: 36px; color: #8B95A1; font-weight: 500;
    margin-top: 16px;
  }

  /* Phone frame */
  .phone {
    width: 920px;
    background: #fff;
    border-radius: 60px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    border: 3px solid #E5E8EB;
  }

  /* Status bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px 12px; font-size: 28px; font-weight: 600;
    background: #F8F9FA;
  }
  .status-icons { display: flex; gap: 10px; align-items: center; font-size: 24px; }

  /* AppBar */
  .app-bar {
    padding: 12px 36px 20px; font-size: 34px; font-weight: 700;
    background: #F8F9FA;
  }

  /* Profile header */
  .profile-header { padding: 20px 36px 0; background: #F8F9FA; }
  .profile-row { display: flex; align-items: center; gap: 36px; }
  .group-icon {
    width: 130px; height: 130px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,210,200,0.15), rgba(49,130,246,0.15), rgba(139,92,246,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 58px;
  }
  .stats-row { display: flex; flex: 1; justify-content: space-evenly; }
  .stat { text-align: center; }
  .stat-num { font-size: 34px; font-weight: 800; }
  .stat-label { font-size: 24px; color: #8B95A1; }
  .group-name { font-size: 30px; font-weight: 600; margin-top: 20px; }
  .group-role { font-size: 26px; color: #8B95A1; margin-top: 4px; }

  /* Action buttons */
  .action-row { display: flex; gap: 16px; padding: 28px 36px 14px; background: #F8F9FA; }
  .action-btn {
    flex: 1; height: 80px; border-radius: 20px;
    border: 2px solid #E5E8EB; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 26px; font-weight: 600;
  }

  /* Tab bar */
  .tab-bar {
    display: flex; border-bottom: 2px solid #E5E8EB; background: #F8F9FA;
  }
  .tab {
    flex: 1; text-align: center; padding: 20px 0;
    font-size: 26px; font-weight: 600; color: #8B95A1;
    position: relative;
  }
  .tab.active { color: #191F28; }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 4px; background: #00D2C8; border-radius: 2px;
  }

  /* Grid */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px;
    padding: 3px; background: #F8F9FA;
  }
  .grid-item { aspect-ratio: 1; position: relative; overflow: hidden; }
  .ph {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
  }
  .ph-blue { background: linear-gradient(135deg, #DBEAFE, #E0E7FF); }
  .ph-pink { background: linear-gradient(135deg, #FCE7F3, #FEE2E2); }
  .ph-green { background: linear-gradient(135deg, #D1FAE5, #ECFDF5); }
  .ph-purple { background: linear-gradient(135deg, #EDE9FE, #E0E7FF); }
  .ph-yellow { background: linear-gradient(135deg, #FEF3C7, #FEF9C3); }
  .ph-teal { background: linear-gradient(135deg, #CCFBF1, #CFFAFE); }
  .ph-text {
    background: #fff; padding: 20px;
    font-size: 22px; color: #4E5968; line-height: 1.6; text-align: center;
  }
  .pin-badge {
    position: absolute; top: 8px; left: 8px;
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    border-radius: 6px; padding: 4px 8px;
    font-size: 18px; color: #fff;
  }
  .multi-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.5); border-radius: 6px; padding: 4px 10px;
    font-size: 20px; color: #fff;
  }
</style>
</head>
<body>

<div class="caption">
  <h1>모임 소식, 한곳에서</h1>
  <p>사진 · 글 · 좋아요 · 댓글 · 대댓글</p>
</div>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">피드</div>

  <div class="profile-header">
    <div class="profile-row">
      <div class="group-icon">👥</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">게시물</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">투표</div></div>
        <div class="stat"><div class="stat-num">8</div><div class="stat-label">멤버</div></div>
      </div>
    </div>
    <div class="group-name">등산 좋아하는 사람들 🏔️</div>
    <div class="group-role">회장</div>
  </div>

  <div class="action-row">
    <div class="action-btn">✏️ 게시물 작성</div>
    <div class="action-btn">📊 투표 만들기</div>
  </div>

  <div class="tab-bar">
    <div class="tab active">📷</div>
    <div class="tab">☑️ 투표</div>
  </div>

  <div class="grid">
    <div class="grid-item"><div class="ph ph-blue">🏔️</div><div class="pin-badge">📌</div></div>
    <div class="grid-item"><div class="ph ph-green">🌲</div><div class="multi-badge">📷</div></div>
    <div class="grid-item"><div class="ph ph-text">다음 주 토요일 북한산 정기 모임! 참석 가능하신 분 댓글 남겨주세요 🙋</div></div>
    <div class="grid-item"><div class="ph ph-pink">🌸</div></div>
    <div class="grid-item"><div class="ph ph-yellow">⛺</div></div>
    <div class="grid-item"><div class="ph ph-purple">🎒</div><div class="multi-badge">📷</div></div>
    <div class="grid-item"><div class="ph ph-text">지난 주말 관악산 후기! 날씨가 정말 좋았어요 ☀️</div></div>
    <div class="grid-item"><div class="ph ph-teal">🏕️</div></div>
    <div class="grid-item"><div class="ph ph-green">🥾</div></div>
  </div>
</div>

</body>
</html>
