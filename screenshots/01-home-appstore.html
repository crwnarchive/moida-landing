<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    width: 1290px; height: 2796px;
    background: #F8F9FA;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  .caption {
    padding-top: 160px; text-align: center; margin-bottom: 80px;
  }
  .caption h1 {
    font-size: 72px; font-weight: 800; color: #191F28;
    letter-spacing: -2px; line-height: 1.3;
  }
  .caption p {
    font-size: 36px; color: #8B95A1; font-weight: 500;
    margin-top: 16px;
  }

  .phone {
    width: 920px;
    background: #fff;
    border-radius: 60px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    border: 3px solid #E5E8EB;
    position: relative;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px 12px; font-size: 28px; font-weight: 600;
    background: #fff;
  }
  .status-icons { display: flex; gap: 10px; align-items: center; font-size: 24px; }

  .app-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 36px 20px; font-size: 34px; font-weight: 700;
    background: #fff;
  }
  .app-bar-left { display: flex; align-items: center; gap: 16px; }
  .app-bar-right { display: flex; align-items: center; gap: 24px; font-size: 32px; }

  .content { padding: 0 32px 32px; background: #F8F9FA; }

  .banner {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    border-radius: 24px; padding: 36px 32px; color: #fff; margin-bottom: 20px;
  }
  .banner-title { font-size: 34px; font-weight: 800; }
  .banner-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .badge-chongmu {
    background: rgba(255,255,255,0.25); border-radius: 20px; padding: 6px 16px;
    font-size: 22px; font-weight: 700;
  }
  .banner-members { font-size: 26px; opacity: 0.9; }

  .card {
    background: #fff; border-radius: 24px; padding: 28px 28px; margin-bottom: 16px;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
  }
  .card-title { font-size: 28px; font-weight: 700; color: #191F28; }
  .card-more { font-size: 24px; color: #8B95A1; }

  .fee-card {
    display: flex; align-items: center; justify-content: space-between;
  }
  .fee-info {}
  .fee-label { font-size: 26px; color: #8B95A1; }
  .fee-value { font-size: 30px; font-weight: 700; color: #00D2C8; margin-top: 4px; }
  .fee-arrow { font-size: 28px; color: #8B95A1; }

  .notice-item { display: flex; justify-content: space-between; align-items: center; }
  .notice-title { font-size: 28px; font-weight: 600; }
  .notice-date { font-size: 24px; color: #8B95A1; }
  .notice-accent { width: 5px; height: 40px; background: #00D2C8; border-radius: 3px; margin-right: 16px; }

  .schedule-item { display: flex; align-items: center; gap: 20px; padding: 10px 0; }
  .schedule-circle {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: #fff;
  }
  .schedule-circle.blue { background: #3182F6; }
  .schedule-circle.pink { background: #F06595; }
  .schedule-info { flex: 1; }
  .schedule-name { font-size: 28px; font-weight: 600; }
  .schedule-date { font-size: 24px; color: #8B95A1; margin-top: 2px; }

  .event-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
  .event-name { font-size: 28px; font-weight: 600; }
  .event-type { font-size: 24px; color: #8B95A1; margin-top: 2px; }

  .bottom-nav {
    display: flex; justify-content: space-around; align-items: center;
    padding: 16px 0 28px; background: #fff;
    border-top: 1px solid #E5E8EB;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .nav-icon {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .nav-icon.active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    color: #fff;
  }
  .nav-label { font-size: 20px; color: #8B95A1; font-weight: 600; }
  .nav-label.active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="caption">
  <h1>모임의 모든 것, 한눈에</h1>
  <p>공지 · 일정 · 경조사 · 회비</p>
</div>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">
    <div class="app-bar-left">
      <span style="font-size:30px;">←</span>
      <span>한국고 32기 동창회</span>
    </div>
    <div class="app-bar-right">
      <span>🔔</span>
      <span>⚙️</span>
    </div>
  </div>

  <div class="content">
    <div class="banner">
      <div class="banner-title">한국고 32기 동창회</div>
      <div class="banner-row">
        <span class="badge-chongmu">총무</span>
        <span class="banner-members">회원 8명 ›</span>
      </div>
    </div>

    <div class="card">
      <div class="fee-card">
        <div class="fee-info">
          <div class="fee-label">2026년 6월 회비</div>
          <div class="fee-value">6명 납부</div>
        </div>
        <div class="fee-arrow">›</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="notice-accent"></div>
          <span class="card-title">최근 공지</span>
        </div>
        <span class="card-more">더보기</span>
      </div>
      <div class="notice-item">
        <span class="notice-title">동창회 공지사항입니다</span>
        <span class="notice-date">2일 전</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">다가오는 일정</span>
        <span class="card-more">더보기</span>
      </div>
      <div class="schedule-item">
        <div class="schedule-circle blue">13</div>
        <div class="schedule-info">
          <div class="schedule-name">한국고 32기 동창회 정기모임</div>
          <div class="schedule-date">6/13 · 10:00</div>
        </div>
      </div>
      <div class="schedule-item">
        <div class="schedule-circle pink">16</div>
        <div class="schedule-info">
          <div class="schedule-name">[경사] 홍길동 결혼식</div>
          <div class="schedule-date">6/16 · 종일</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">경조사</span>
        <span class="card-more">더보기</span>
      </div>
      <div class="event-item">
        <div>
          <div class="event-name">홍길동 결혼식</div>
          <div class="event-type">경사 · 결혼</div>
        </div>
      </div>
      <div style="border-top:1px solid #F2F4F6; margin:8px 0;"></div>
      <div class="event-item">
        <div>
          <div class="event-name">김00 조부상</div>
          <div class="event-type">조사 · 부고</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <div class="nav-icon active">🏠</div>
      <span class="nav-label active">홈</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📢</div>
      <span class="nav-label">소식</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📷</div>
      <span class="nav-label">피드</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">캘린더</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">💰</div>
      <span class="nav-label">회비</span>
    </div>
  </div>
</div>

</body>
</html>
