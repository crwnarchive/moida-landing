<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    width: 1290px; height: 2796px;
    background: #F8F9FA;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  .caption {
    padding-top: 80px; text-align: center; margin-bottom: 40px;
  }
  .caption h1 {
    font-size: 64px; font-weight: 800; color: #191F28;
    letter-spacing: -2px; line-height: 1.3;
  }
  .caption p {
    font-size: 32px; color: #8B95A1; font-weight: 500;
    margin-top: 16px;
  }

  .phone {
    width: 1020px;
    background: #fff;
    border-radius: 60px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    border: 3px solid #E5E8EB;
    position: relative;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px 12px; font-size: 28px; font-weight: 600;
    background: #fff;
  }
  .status-icons { display: flex; gap: 10px; align-items: center; font-size: 24px; }

  .app-bar {
    display: flex; align-items: center;
    padding: 12px 36px 20px; font-size: 34px; font-weight: 700;
    background: #fff; gap: 16px;
  }

  .month-nav {
    display: flex; align-items: center; justify-content: center; gap: 32px;
    padding: 20px 0 24px; font-size: 32px; font-weight: 700; color: #191F28;
    background: #F8F9FA;
  }
  .month-arrow { color: #8B95A1; font-size: 28px; }

  .summary-card {
    margin: 0 32px 20px; background: #fff; border-radius: 24px;
    padding: 32px 20px; display: flex; justify-content: space-around; text-align: center;
  }
  .sum-item {}
  .sum-label { font-size: 24px; color: #8B95A1; font-weight: 600; margin-bottom: 8px; }
  .sum-value { font-size: 30px; font-weight: 800; }
  .sum-value.green { color: #10B981; }
  .sum-value.red { color: #EF4444; }
  .sum-value.blue { color: #3182F6; }

  .tab-toggle {
    display: flex; margin: 0 32px 24px; background: #F2F4F6; border-radius: 16px;
    padding: 4px;
  }
  .toggle-item {
    flex: 1; text-align: center; padding: 16px 0; border-radius: 14px;
    font-size: 26px; font-weight: 700; color: #8B95A1;
  }
  .toggle-item.active {
    background: #00D2C8; color: #fff;
  }

  .content { padding: 0 32px; background: #F8F9FA; flex: 1; }

  .list-title {
    font-size: 28px; font-weight: 700; color: #8B95A1; margin-bottom: 20px;
  }

  .tx-row {
    display: flex; align-items: center; gap: 20px;
    background: #fff; border-radius: 20px; padding: 24px 24px; margin-bottom: 14px;
  }
  .tx-icon {
    width: 64px; height: 64px; border-radius: 50%; background: rgba(16,185,129,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #10B981; font-weight: 800;
  }
  .tx-info { flex: 1; }
  .tx-name { font-size: 28px; font-weight: 600; color: #191F28; }
  .tx-date { font-size: 24px; color: #8B95A1; margin-top: 4px; }
  .tx-amount { font-size: 30px; font-weight: 800; }
  .tx-amount.green { color: #10B981; }
  .tx-amount.red { color: #EF4444; }

  .fab-group {
    position: absolute; bottom: 40px; right: 32px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .fab-btn {
    padding: 18px 28px; border-radius: 50px; color: #fff;
    font-size: 26px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .fab-income {
    background: linear-gradient(135deg, #00D2C8, #34D399);
  }
  .fab-expense {
    background: linear-gradient(135deg, #8B5CF6, #A78BFA);
  }
</style>
</head>
<body>

<div class="caption">
  <h1>투명한 장부 관리</h1>
  <p>수입 · 지출 내역 한눈에</p>
</div>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">
    <span style="font-size:30px;">‹</span>
    <span>수입/지출 장부</span>
  </div>

  <div class="month-nav">
    <span class="month-arrow">‹</span>
    <span>2026년 6월</span>
    <span class="month-arrow">›</span>
  </div>

  <div class="summary-card">
    <div class="sum-item">
      <div class="sum-label">수입</div>
      <div class="sum-value green">200,000원</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">지출</div>
      <div class="sum-value red">0원</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">잔액</div>
      <div class="sum-value blue">200,000원</div>
    </div>
  </div>

  <div class="tab-toggle">
    <div class="toggle-item active">리스트</div>
    <div class="toggle-item">캘린더</div>
  </div>

  <div class="content">
    <div class="list-title">2026년 6월 내역</div>

    <div class="tx-row">
      <div class="tx-icon">↓</div>
      <div class="tx-info">
        <div class="tx-name">정이 회비 (2026년 6월)</div>
        <div class="tx-date">2026.06.09 · 회비</div>
      </div>
      <div class="tx-amount green">+100,000원</div>
    </div>

    <div class="tx-row">
      <div class="tx-icon">↓</div>
      <div class="tx-info">
        <div class="tx-name">모이다 회비 (2026년 6월)</div>
        <div class="tx-date">2026.06.07 · 회비</div>
      </div>
      <div class="tx-amount green">+100,000원</div>
    </div>
  </div>

  <div class="fab-group">
    <div class="fab-btn fab-income">+ 수입 입력</div>
    <div class="fab-btn fab-expense">- 지출 입력</div>
  </div>
</div>

</body>
</html>
