<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1290px;height:2796px;
  background:linear-gradient(180deg, #F5EEFF 0%, #EDE0FF 100%);
  overflow:hidden;
}

/* Scale container: design at 430px, render at 1290px (3x) */
.scale-wrap{
  transform:scale(3);
  transform-origin:top left;
  width:430px;
  height:932px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Caption area */
.cap{
  padding:52px 24px 20px;
  text-align:center;
  flex-shrink:0;
}
.cap h1{
  font-size:22px;font-weight:800;color:#191F28;
  letter-spacing:-0.5px;line-height:1.3;
}
.cap p{
  font-size:13px;color:#8B95A1;font-weight:500;
  margin-top:6px;
}

/* Phone screen area */
.screen{
  flex:1;
  background:#fff;
  border-radius:20px 20px 0 0;
  margin:0 12px;
  box-shadow:0 -2px 20px rgba(0,0,0,0.06);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* Status bar */
.sbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px 4px;font-size:12px;font-weight:600;
  background:#fff;flex-shrink:0;
}
.sbar-r{display:flex;gap:4px;align-items:center}
.sbar-r svg{width:14px;height:14px}

/* Dynamic Island */
.di{width:72px;height:18px;background:#000;border-radius:10px;margin:0 auto 2px;flex-shrink:0}

/* App bar */
.abar{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 16px 8px;font-size:16px;font-weight:700;
  background:#fff;flex-shrink:0;
}
.abar-l{display:flex;align-items:center;gap:8px}
.abar-r{display:flex;align-items:center;gap:10px;font-size:15px}

/* Content */
.cnt{flex:1;padding:0 14px 14px;background:#F5F5F7;overflow:hidden}

/* Bottom nav */
.bnav{
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 0 20px;background:#fff;
  border-top:1px solid #E5E8EB;flex-shrink:0;
}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px}
.bicon{font-size:14px;width:28px;height:24px;display:flex;align-items:center;justify-content:center}
.bni.active .bicon{
  background:linear-gradient(135deg,rgba(0,210,200,0.15),rgba(49,130,246,0.15));
  border-radius:8px;width:36px;
}
.blbl{font-size:9px;color:#8B95A1;font-weight:600}
.bni.active .blbl{
  background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;
}

/* Cards */
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ct{font-size:13px;font-weight:700;color:#191F28}
.cm{font-size:10px;color:#3182F6;font-weight:600}
.banner{
  background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);
  border-radius:12px;padding:14px 14px;color:#fff;margin-bottom:8px;
}
.banner-t{font-size:14px;font-weight:800}
.banner-r{display:flex;align-items:center;gap:6px;margin-top:6px}
.badge{background:rgba(255,255,255,0.25);border-radius:10px;padding:2px 8px;font-size:9px;font-weight:700}
.banner-s{font-size:11px;opacity:0.9}

/* Fee */
.fr{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #F2F4F6}
.fr:last-child{border-bottom:none}
.fa{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#4f46e5;margin-right:8px;flex-shrink:0}
.fn{flex:1;font-size:12px;font-weight:600;color:#333}
.fb{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px}
.fp{background:#ecfdf5;color:#059669}.fpd{background:#fef3c7;color:#d97706}.fu{background:#fee2e2;color:#dc2626}

/* Feed */
.fpost{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden}
.fh{display:flex;align-items:center;padding:10px 12px 6px;gap:8px}
.fav{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.fname{font-size:12px;font-weight:700;color:#191F28}
.ftime{font-size:9px;color:#8B95A1}
.fbody{padding:0 12px 8px;font-size:12px;color:#333D4B;line-height:1.5}
.fimg{width:calc(100% - 24px);margin:0 12px 8px;border-radius:8px}
.facts{display:flex;padding:2px 12px 8px;gap:12px;font-size:10px;color:#8B95A1}

/* Poll */
.pcard{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.pq{font-size:13px;font-weight:700;color:#191F28;margin-bottom:8px}
.po{background:#F5F5F7;border-radius:8px;padding:8px 10px;margin-bottom:5px;position:relative;overflow:hidden}
.pof{position:absolute;left:0;top:0;bottom:0;border-radius:8px}
.pot{position:relative;z-index:1;display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:#333D4B}
.pm{font-size:9px;color:#8B95A1;margin-top:6px}

/* Calendar */
.cmo{text-align:center;font-size:14px;font-weight:700;color:#191F28;padding:8px 0 4px}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;text-align:center;font-size:9px;color:#8B95A1;font-weight:600}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;text-align:center;font-size:11px}
.cc{padding:5px 2px;color:#333D4B}
.cc.today{font-weight:800;color:#3182F6}
.cc .dot{width:4px;height:4px;border-radius:50%;margin:2px auto 0}
.dot.blue{background:#3182F6}.dot.red{background:#ef4444}.dot.green{background:#10b981}
.cev{display:flex;align-items:center;padding:7px 10px;margin:3px 12px;background:#fff;border-radius:8px;gap:8px}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cen{font-size:11px;font-weight:600;color:#333D4B}
.ced{font-size:9px;color:#8B95A1}

/* Ledger */
.lsum{display:flex;gap:6px;margin-bottom:8px}
.lbox{flex:1;background:#fff;border-radius:12px;padding:10px 8px;text-align:center}
.ll{font-size:9px;color:#8B95A1;font-weight:600;margin-bottom:3px}
.la{font-size:13px;font-weight:800}
.la.blue{color:#3182F6}.la.red{color:#ef4444}.la.green{color:#10b981}
.lr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #F2F4F6}
.lr:last-child{border-bottom:none}
.li{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:8px;font-size:12px}
.lt{flex:1}
.ltt{font-size:11px;font-weight:600;color:#333D4B}
.ltd{font-size:9px;color:#8B95A1}
.lv{font-size:12px;font-weight:700}

/* Stats */
.stats{display:flex;justify-content:space-around;text-align:center;background:#fff;border-radius:12px;padding:14px 10px;margin-bottom:8px}
.sn{font-size:18px;font-weight:800}
.sn.teal{color:#00D2C8}.sn.orange{color:#F59E0B}.sn.red{color:#EF4444}.sn.blue{color:#3182F6}
.sl{font-size:9px;color:#8B95A1;margin-top:2px;font-weight:600}
.pbar-wrap{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.pbar-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pbar-t{font-size:11px;color:#8B95A1;font-weight:600}
.pbar-p{font-size:14px;font-weight:800;color:#191F28}
.pbar{height:8px;background:#F2F4F6;border-radius:4px;overflow:hidden}
.pfill{height:100%;width:75%;border-radius:4px;background:linear-gradient(90deg,#00D2C8,#3182F6)}
.acard{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.al{font-size:11px;color:#8B95A1;font-weight:600}
.av{font-size:15px;font-weight:800;color:#00D2C8;margin-top:4px}
.at{color:#8B95A1;font-weight:600}
.brow{display:flex;gap:8px;margin-bottom:8px}
.bo{flex:1;height:36px;border-radius:10px;border:1.5px solid #E5E8EB;background:#fff;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:600;color:#191F28}
</style>
</head>
<body>
<div class="scale-wrap">
  <div class="cap">
    <h1>빠르게 의견 모으기</h1>
    <p>복수 선택 · 마감 기한 · 실시간 결과</p>
  </div>
  <div class="screen">
    <div class="di"></div>
    <div class="sbar">
      <span>9:41</span>
      <div class="sbar-r">
        <svg viewBox="0 0 20 14" fill="#000"><rect x="0" y="9" width="4" height="5" rx="1"/><rect x="5" y="6" width="4" height="8" rx="1"/><rect x="10" y="3" width="4" height="11" rx="1"/><rect x="15" y="0" width="4" height="14" rx="1"/></svg>
        <svg viewBox="0 0 24 12" fill="none"><rect x=".5" y=".5" width="20" height="11" rx="2.5" stroke="#000" stroke-width="1.2"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.5" fill="#000"/><path d="M22 4v4a2.5 2.5 0 000-4z" fill="#000"/></svg>
      </div>
    </div>
    <div class="abar"><div class="abar-l"><span style="font-size:14px">←</span><span>투표</span></div></div>
    <div class="cnt">
      <div class="pcard"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div class="fav" style="width:28px;height:28px;background:linear-gradient(135deg,#00D2C8,#3182F6)"></div><div><div style="font-size:11px;font-weight:700;color:#333">총무 김민수</div><div style="font-size:9px;color:#8B95A1">3시간 전 · 진행 중</div></div></div><div class="pq">🗳️ 7월 정기모임 날짜</div><div class="po"><div class="pof" style="width:55%;background:linear-gradient(90deg,rgba(0,210,200,0.15),rgba(49,130,246,0.15))"></div><div class="pot"><span>7월 12일 (토)</span><span style="color:#3182F6">55%</span></div></div><div class="po"><div class="pof" style="width:30%;background:rgba(139,92,246,0.1)"></div><div class="pot"><span>7월 13일 (일)</span><span>30%</span></div></div><div class="po"><div class="pof" style="width:15%;background:rgba(139,92,246,0.06)"></div><div class="pot"><span>7월 19일 (토)</span><span>15%</span></div></div><div class="pm">20명 참여 · 3일 남음</div></div>
      <div class="pcard"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div class="fav" style="width:28px;height:28px;background:linear-gradient(135deg,#8B5CF6,#a78bfa)"></div><div><div style="font-size:11px;font-weight:700;color:#333">이영희</div><div style="font-size:9px;color:#8B95A1">어제 · 진행 중</div></div></div><div class="pq">🍽️ 회식 장소 투표</div><div class="po"><div class="pof" style="width:42%;background:linear-gradient(90deg,rgba(0,210,200,0.15),rgba(49,130,246,0.15))"></div><div class="pot"><span>강남 고깃집</span><span style="color:#3182F6">42%</span></div></div><div class="po"><div class="pof" style="width:38%;background:rgba(139,92,246,0.1)"></div><div class="pot"><span>이태원 이탈리안</span><span>38%</span></div></div><div class="po"><div class="pof" style="width:20%;background:rgba(139,92,246,0.06)"></div><div class="pot"><span>홍대 일식집</span><span>20%</span></div></div><div class="pm">16명 참여 · 5일 남음</div></div>
      <div class="pcard" style="opacity:0.6"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div class="fav" style="width:28px;height:28px;background:linear-gradient(135deg,#f472b6,#ec4899)"></div><div><div style="font-size:11px;font-weight:700;color:#333">박지훈</div><div style="font-size:9px;color:#8B95A1">3일 전 · 마감</div></div></div><div class="pq">🎁 생일 선물 뭐가 좋을까요?</div><div class="po"><div class="pof" style="width:60%;background:linear-gradient(90deg,rgba(16,185,129,0.15),rgba(16,185,129,0.1))"></div><div class="pot"><span>✅ 기프티콘</span><span style="color:#059669">60%</span></div></div><div class="pm">22명 참여 · 마감됨</div></div>
    </div>
    <div class="bnav">
        <div class="bni"><div class="bicon">🏠</div><span class="blbl">홈</span></div>
        <div class="bni"><div class="bicon">📢</div><span class="blbl">소식</span></div>
        <div class="bni active"><div class="bicon">📰</div><span class="blbl">피드</span></div>
        <div class="bni"><div class="bicon">📅</div><span class="blbl">캘린더</span></div>
        <div class="bni"><div class="bicon">💰</div><span class="blbl">회비</span></div>
      </div>
  </div>
</div>
</body>
</html>
