<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  width:1290px;height:2796px;
  background:linear-gradient(180deg, #F5EEFF 0%, #EDE0FF 100%);
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}

/* Caption - compact, top area */
.caption{
  padding:120px 0 48px;
  text-align:center;
  flex-shrink:0;
}
.caption h1{
  font-size:64px;font-weight:800;color:#191F28;
  letter-spacing:-2px;line-height:1.25;
}
.caption p{
  font-size:30px;color:#8B95A1;font-weight:500;
  margin-top:14px;letter-spacing:-0.5px;
}

/* Phone - large, bleeds off bottom */
.phone{
  width:1100px;
  flex:1;
  background:#fff;
  border-radius:48px 48px 0 0;
  box-shadow:0 -4px 60px rgba(0,0,0,0.08),0 -1px 3px rgba(0,0,0,0.04);
  overflow:hidden;
  display:flex;flex-direction:column;
}

/* Status bar */
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 44px 8px;font-size:28px;font-weight:600;
  background:#fff;flex-shrink:0;
}
.status-icons{display:flex;gap:8px;align-items:center}
.status-icons svg{width:26px;height:26px}

/* Dynamic Island */
.di{
  width:140px;height:36px;background:#000;border-radius:20px;
  margin:0 auto 4px;flex-shrink:0;
}

/* App bar */
.app-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 36px 14px;font-size:34px;font-weight:700;
  background:#fff;flex-shrink:0;
}
.app-bar-left{display:flex;align-items:center;gap:16px}
.app-bar-right{display:flex;align-items:center;gap:20px;font-size:30px}

/* Content */
.content{{
  flex:1;padding:0 32px 32px;background:#F5F5F7;
}}

/* Bottom nav */
.bottom-nav{
  display:flex;justify-content:space-around;align-items:center;
  padding:16px 0 32px;background:#fff;
  border-top:1px solid #E5E8EB;flex-shrink:0;margin-top:auto;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.nav-icon{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
}
.nav-item.active .nav-icon{
  background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);
  color:#fff;border-radius:16px;width:64px;
}
.nav-label{font-size:20px;color:#8B95A1;font-weight:600}
.nav-item.active .nav-label{
  background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:700;
}

/* Shared components */
.card{background:#fff;border-radius:20px;padding:24px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-title{font-size:28px;font-weight:700;color:#191F28}
.card-more{font-size:22px;color:#3182F6;font-weight:600}
.banner{
  background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);
  border-radius:20px;padding:32px 28px;color:#fff;margin-bottom:14px;
}
.banner-title{font-size:32px;font-weight:800}
.banner-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.badge{background:rgba(255,255,255,0.25);border-radius:16px;padding:5px 14px;font-size:20px;font-weight:700}
.banner-sub{font-size:24px;opacity:0.9}

/* Fee items */
.fee-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #F2F4F6}
.fee-row:last-child{border-bottom:none}
.fee-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#4f46e5;margin-right:14px;flex-shrink:0}
.fee-name{flex:1;font-size:26px;font-weight:600;color:#333}
.fee-badge{font-size:20px;font-weight:700;padding:4px 14px;border-radius:10px}
.fee-paid{background:#ecfdf5;color:#059669}
.fee-pending{background:#fef3c7;color:#d97706}
.fee-unpaid{background:#fee2e2;color:#dc2626}

/* Feed */
.feed-post{background:#fff;border-radius:20px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.feed-header{display:flex;align-items:center;padding:20px 24px 12px;gap:14px}
.feed-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0}
.feed-name{font-size:26px;font-weight:700;color:#191F28}
.feed-time{font-size:20px;color:#8B95A1}
.feed-body{padding:0 24px 16px;font-size:26px;color:#333D4B;line-height:1.6}
.feed-img{width:calc(100% - 48px);margin:0 24px 14px;border-radius:14px}
.feed-actions{display:flex;padding:4px 24px 16px;gap:24px;font-size:22px;color:#8B95A1}

/* Poll */
.poll-card{background:#fff;border-radius:20px;padding:24px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.poll-q{font-size:28px;font-weight:700;color:#191F28;margin-bottom:16px}
.poll-opt{background:#F5F5F7;border-radius:14px;padding:18px 20px;margin-bottom:10px;position:relative;overflow:hidden}
.poll-fill{position:absolute;left:0;top:0;bottom:0;border-radius:14px}
.poll-text{position:relative;z-index:1;display:flex;justify-content:space-between;font-size:24px;font-weight:600;color:#333D4B}
.poll-meta{font-size:20px;color:#8B95A1;margin-top:10px}

/* Calendar */
.cal-month{text-align:center;font-size:30px;font-weight:700;color:#191F28;padding:14px 0 8px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);padding:0 24px;text-align:center;font-size:20px;color:#8B95A1;font-weight:600;margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 24px;text-align:center;font-size:24px}
.cal-cell{padding:10px 4px;color:#333D4B}
.cal-cell.today{font-weight:800;color:#3182F6}
.cal-cell .dot{width:7px;height:7px;border-radius:50%;margin:3px auto 0}
.cal-cell .dot.blue{background:#3182F6}.cal-cell .dot.red{background:#ef4444}.cal-cell .dot.green{background:#10b981}
.cal-event{display:flex;align-items:center;padding:14px 18px;margin:5px 24px;background:#fff;border-radius:14px;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-evt-name{font-size:24px;font-weight:600;color:#333D4B}
.cal-evt-date{font-size:20px;color:#8B95A1}

/* Ledger */
.ldg-summary{display:flex;gap:12px;margin-bottom:14px}
.ldg-box{flex:1;background:#fff;border-radius:20px;padding:24px 14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.ldg-label{font-size:22px;color:#8B95A1;margin-bottom:6px;font-weight:600}
.ldg-amt{font-size:30px;font-weight:800}
.ldg-amt.blue{color:#3182F6}.ldg-amt.red{color:#ef4444}.ldg-amt.green{color:#10b981}
.ldg-row{display:flex;align-items:center;padding:16px 0;border-bottom:1px solid #F2F4F6}
.ldg-row:last-child{border-bottom:none}
.ldg-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-right:14px;font-size:24px}
.ldg-text{flex:1}
.ldg-title{font-size:24px;font-weight:600;color:#333D4B}
.ldg-date{font-size:20px;color:#8B95A1;margin-top:2px}
.ldg-val{font-size:26px;font-weight:700}

/* Stat cards */
.stats{display:flex;justify-content:space-around;text-align:center;background:#fff;border-radius:20px;padding:28px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.stat-num{font-size:38px;font-weight:800}
.stat-num.teal{color:#00D2C8}.stat-num.orange{color:#F59E0B}.stat-num.red{color:#EF4444}.stat-num.blue{color:#3182F6}
.stat-label{font-size:22px;color:#8B95A1;margin-top:4px;font-weight:600}
.progress-card{background:#fff;border-radius:20px;padding:24px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-txt{font-size:24px;color:#8B95A1;font-weight:600}
.progress-pct{font-size:30px;font-weight:800;color:#191F28}
.progress-bar{height:18px;background:#F2F4F6;border-radius:9px;overflow:hidden}
.progress-fill{height:100%;width:75%;border-radius:9px;background:linear-gradient(90deg,#00D2C8,#3182F6)}
.amt-card{background:#fff;border-radius:20px;padding:24px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.amt-label{font-size:24px;color:#8B95A1;font-weight:600}
.amt-val{font-size:32px;font-weight:800;color:#00D2C8;margin-top:6px}
.amt-total{color:#8B95A1;font-weight:600}
.btn-row{display:flex;gap:14px;margin-bottom:14px}
.btn-o{flex:1;height:72px;border-radius:18px;border:2px solid #E5E8EB;background:#fff;display:flex;align-items:center;justify-content:center;gap:8px;font-size:24px;font-weight:600;color:#191F28}
.btn-f{width:100%;height:72px;border-radius:18px;border:2px solid #E5E8EB;background:#fff;display:flex;align-items:center;justify-content:center;gap:8px;font-size:24px;font-weight:600;color:#191F28}
</style>
</head>
<body>
<div class="caption">
  <h1>빠르게 의견 모으기</h1>
  <p>복수 선택 · 마감 기한 · 실시간 결과</p>
</div>
<div class="phone">
  <div class="di"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 20 14" fill="#000"><rect x="0" y="9" width="4" height="5" rx="1"/><rect x="5" y="6" width="4" height="8" rx="1"/><rect x="10" y="3" width="4" height="11" rx="1"/><rect x="15" y="0" width="4" height="14" rx="1"/></svg>
      <svg viewBox="0 0 24 12" fill="none"><rect x=".5" y=".5" width="20" height="11" rx="2.5" stroke="#000" stroke-width="1.2"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.5" fill="#000"/><path d="M22 4v4a2.5 2.5 0 000-4z" fill="#000"/></svg>
    </div>
  </div>
  <div class="app-bar"><div class="app-bar-left"><span style="font-size:28px">←</span><span>투표</span></div></div>
  <div class="content">
    <div class="poll-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div class="feed-avatar" style="width:44px;height:44px;background:linear-gradient(135deg,#00D2C8,#3182F6)"></div><div><div style="font-size:24px;font-weight:700;color:#333D4B">총무 김민수</div><div style="font-size:20px;color:#8B95A1">3시간 전 · 진행 중</div></div></div>
      <div class="poll-q">🗳️ 7월 정기모임 날짜</div>
      <div class="poll-opt"><div class="poll-fill" style="width:55%;background:linear-gradient(90deg,rgba(0,210,200,0.15),rgba(49,130,246,0.15))"></div><div class="poll-text"><span>7월 12일 (토)</span><span style="color:#3182F6">55%</span></div></div>
      <div class="poll-opt"><div class="poll-fill" style="width:30%;background:rgba(139,92,246,0.1)"></div><div class="poll-text"><span>7월 13일 (일)</span><span>30%</span></div></div>
      <div class="poll-opt"><div class="poll-fill" style="width:15%;background:rgba(139,92,246,0.06)"></div><div class="poll-text"><span>7월 19일 (토)</span><span>15%</span></div></div>
      <div class="poll-meta">20명 참여 · 3일 남음</div>
    </div>
    <div class="poll-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div class="feed-avatar" style="width:44px;height:44px;background:linear-gradient(135deg,#8B5CF6,#a78bfa)"></div><div><div style="font-size:24px;font-weight:700;color:#333D4B">이영희</div><div style="font-size:20px;color:#8B95A1">어제 · 진행 중</div></div></div>
      <div class="poll-q">🍽️ 회식 장소 투표</div>
      <div class="poll-opt"><div class="poll-fill" style="width:42%;background:linear-gradient(90deg,rgba(0,210,200,0.15),rgba(49,130,246,0.15))"></div><div class="poll-text"><span>강남 고깃집</span><span style="color:#3182F6">42%</span></div></div>
      <div class="poll-opt"><div class="poll-fill" style="width:38%;background:rgba(139,92,246,0.1)"></div><div class="poll-text"><span>이태원 이탈리안</span><span>38%</span></div></div>
      <div class="poll-opt"><div class="poll-fill" style="width:20%;background:rgba(139,92,246,0.06)"></div><div class="poll-text"><span>홍대 일식집</span><span>20%</span></div></div>
      <div class="poll-meta">16명 참여 · 5일 남음</div>
    </div>
    <div class="poll-card" style="opacity:0.65">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div class="feed-avatar" style="width:44px;height:44px;background:linear-gradient(135deg,#f472b6,#ec4899)"></div><div><div style="font-size:24px;font-weight:700;color:#333D4B">박지훈</div><div style="font-size:20px;color:#8B95A1">3일 전 · 마감</div></div></div>
      <div class="poll-q">🎁 생일 선물 뭐가 좋을까요?</div>
      <div class="poll-opt"><div class="poll-fill" style="width:60%;background:linear-gradient(90deg,rgba(16,185,129,0.15),rgba(16,185,129,0.1))"></div><div class="poll-text"><span>✅ 기프티콘</span><span style="color:#059669">60%</span></div></div>
      <div class="poll-meta">22명 참여 · 마감됨</div>
    </div>
  </div>
  <div class="bottom-nav">
      <div class="nav-item"><div class="nav-icon">🏠</div><span class="nav-label">홈</span></div>
      <div class="nav-item"><div class="nav-icon">📢</div><span class="nav-label">소식</span></div>
      <div class="nav-item active"><div class="nav-icon">📰</div><span class="nav-label">피드</span></div>
      <div class="nav-item"><div class="nav-icon">📅</div><span class="nav-label">캘린더</span></div>
      <div class="nav-item"><div class="nav-icon">💰</div><span class="nav-label">회비</span></div>
    </div>
</div>
</body>
</html>
