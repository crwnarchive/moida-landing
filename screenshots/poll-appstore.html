<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    width: 1290px; height: 2796px;
    background: #F8F9FA;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  .caption {
    padding-top: 80px; text-align: center; margin-bottom: 40px;
  }
  .caption h1 {
    font-size: 64px; font-weight: 800; color: #191F28;
    letter-spacing: -2px; line-height: 1.3;
  }
  .caption p {
    font-size: 32px; color: #8B95A1; font-weight: 500;
    margin-top: 16px;
  }

  .phone {
    width: 1020px;
    background: #fff;
    border-radius: 60px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    border: 3px solid #E5E8EB;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px 12px; font-size: 28px; font-weight: 600;
    background: #F8F9FA;
  }
  .status-icons { display: flex; gap: 10px; align-items: center; font-size: 24px; }

  .app-bar {
    padding: 12px 36px 20px; font-size: 34px; font-weight: 700;
    background: #F8F9FA;
  }

  .profile-header { padding: 20px 36px 0; background: #F8F9FA; }
  .profile-row { display: flex; align-items: center; gap: 36px; }
  .group-icon {
    width: 130px; height: 130px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,210,200,0.15), rgba(49,130,246,0.15), rgba(139,92,246,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 58px;
  }
  .stats-row { display: flex; flex: 1; justify-content: space-evenly; }
  .stat { text-align: center; }
  .stat-num { font-size: 34px; font-weight: 800; }
  .stat-label { font-size: 24px; color: #8B95A1; }
  .group-name { font-size: 30px; font-weight: 600; margin-top: 20px; }
  .group-role { font-size: 26px; color: #8B95A1; margin-top: 4px; }

  .action-row { display: flex; gap: 16px; padding: 28px 36px 14px; background: #F8F9FA; }
  .action-btn {
    flex: 1; height: 80px; border-radius: 20px;
    border: 2px solid #E5E8EB; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 26px; font-weight: 600;
  }

  .tab-bar {
    display: flex; border-bottom: 2px solid #E5E8EB; background: #F8F9FA;
  }
  .tab {
    flex: 1; text-align: center; padding: 20px 0;
    font-size: 26px; font-weight: 600; color: #8B95A1;
    position: relative;
  }
  .tab.active { color: #191F28; }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 4px; background: #00D2C8; border-radius: 2px;
  }

  /* Poll list */
  .poll-list { padding: 24px 32px; display: flex; flex-direction: column; gap: 16px; background: #F8F9FA; }
  .poll-card {
    background: #fff; border-radius: 24px; padding: 28px 30px;
    display: flex; align-items: center; gap: 24px;
  }
  .poll-icon {
    width: 72px; height: 72px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
  }
  .poll-icon.active {
    background: linear-gradient(135deg, rgba(0,210,200,0.15), rgba(49,130,246,0.15), rgba(139,92,246,0.15));
  }
  .poll-icon.closed { background: #E5E8EB; }
  .poll-info { flex: 1; }
  .poll-title { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  .poll-title.closed { color: #8B95A1; }
  .poll-count { font-size: 24px; color: #8B95A1; margin-top: 6px; }
  .poll-badge {
    padding: 8px 20px; border-radius: 30px;
    font-size: 22px; font-weight: 700; color: #fff;
  }
  .badge-active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
  }
  .badge-closed { background: #E5E8EB; color: #8B95A1; }
</style>
</head>
<body>

<div class="caption">
  <h1>빠르게 의견 모으기</h1>
  <p>복수 선택 · 마감 기한 · 실시간 결과</p>
</div>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">피드</div>

  <div class="profile-header">
    <div class="profile-row">
      <div class="group-icon">👥</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">게시물</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">투표</div></div>
        <div class="stat"><div class="stat-num">8</div><div class="stat-label">멤버</div></div>
      </div>
    </div>
    <div class="group-name">등산 좋아하는 사람들 🏔️</div>
    <div class="group-role">회장</div>
  </div>

  <div class="action-row">
    <div class="action-btn">✏️ 게시물 작성</div>
    <div class="action-btn">📊 투표 만들기</div>
  </div>

  <div class="tab-bar">
    <div class="tab">📷</div>
    <div class="tab active">☑️ 투표</div>
  </div>

  <div class="poll-list">
    <div class="poll-card">
      <div class="poll-icon active">📊</div>
      <div class="poll-info">
        <div class="poll-title">다음 모임 장소 투표</div>
        <div class="poll-count">12명 참여</div>
      </div>
      <div class="poll-badge badge-active">진행중</div>
    </div>

    <div class="poll-card">
      <div class="poll-icon active">📊</div>
      <div class="poll-info">
        <div class="poll-title">7월 정기모임 날짜</div>
        <div class="poll-count">8명 참여</div>
      </div>
      <div class="poll-badge badge-active">진행중</div>
    </div>

    <div class="poll-card">
      <div class="poll-icon active">📊</div>
      <div class="poll-info">
        <div class="poll-title">회비 사용 항목 (복수 선택)</div>
        <div class="poll-count">15명 참여</div>
      </div>
      <div class="poll-badge badge-active">진행중</div>
    </div>

    <div class="poll-card">
      <div class="poll-icon closed">📊</div>
      <div class="poll-info">
        <div class="poll-title closed">6월 등산 코스 투표</div>
        <div class="poll-count">10명 참여</div>
      </div>
      <div class="poll-badge badge-closed">마감</div>
    </div>
  </div>
</div>

</body>
</html>
