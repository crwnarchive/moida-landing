<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #F8F9FA;
    width: 393px;
    min-height: 852px;
    overflow: hidden;
    color: #191F28;
    -webkit-font-smoothing: antialiased;
  }

  /* Status bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 8px;
    font-size: 16px; font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .signal { font-size: 13px; }
  .battery { width: 27px; height: 13px; border: 1.5px solid #191F28; border-radius: 3px; position: relative; }
  .battery::after { content:''; position: absolute; right: -5px; top: 3px; width: 2px; height: 5px; background: #191F28; border-radius: 0 1px 1px 0; }
  .battery-fill { width: 85%; height: 100%; background: #191F28; border-radius: 1px; }

  /* AppBar */
  .app-bar {
    padding: 8px 20px 12px;
    font-size: 18px; font-weight: 700;
  }

  /* Profile header */
  .profile-header {
    padding: 12px 20px 0;
  }
  .profile-row {
    display: flex; align-items: center; gap: 20px;
  }
  .group-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,210,200,0.12), rgba(49,130,246,0.12), rgba(139,92,246,0.12));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #3182F6;
  }
  .stats-row {
    display: flex; flex: 1; justify-content: space-evenly;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 18px; font-weight: 800; }
  .stat-label { font-size: 13px; color: #8B95A1; }
  .group-name {
    font-size: 16px; font-weight: 600; margin-top: 12px;
  }
  .group-role {
    font-size: 14px; color: #8B95A1; margin-top: 2px;
  }

  /* Action buttons */
  .action-row {
    display: flex; gap: 10px; padding: 16px 20px 8px;
  }
  .action-btn {
    flex: 1; height: 44px; border-radius: 12px;
    border: 1px solid #E5E8EB; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 14px; font-weight: 600; color: #191F28;
  }
  .action-btn .icon {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-size: 18px;
  }

  /* Tab bar */
  .tab-bar {
    display: flex; border-bottom: 1px solid #E5E8EB;
    background: #F8F9FA;
  }
  .tab {
    flex: 1; text-align: center; padding: 12px 0;
    font-size: 14px; font-weight: 600; color: #8B95A1;
    position: relative;
  }
  .tab.active { color: #191F28; }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2.5px; background: #00D2C8; border-radius: 2px;
  }

  /* Grid */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px;
    padding: 2px;
  }
  .grid-item {
    aspect-ratio: 1; position: relative; overflow: hidden;
  }
  .grid-item img, .grid-item .placeholder {
    width: 100%; height: 100%; object-fit: cover;
  }
  .placeholder {
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #8B95A1; padding: 8px; line-height: 1.4;
    text-align: center;
  }
  .ph-blue { background: linear-gradient(135deg, #DBEAFE, #E0E7FF); }
  .ph-pink { background: linear-gradient(135deg, #FCE7F3, #FEE2E2); }
  .ph-green { background: linear-gradient(135deg, #D1FAE5, #ECFDF5); }
  .ph-purple { background: linear-gradient(135deg, #EDE9FE, #E0E7FF); }
  .ph-yellow { background: linear-gradient(135deg, #FEF3C7, #FEF9C3); }
  .ph-teal { background: linear-gradient(135deg, #CCFBF1, #CFFAFE); }
  .ph-text {
    background: #fff;
    padding: 10px; font-size: 11px; color: #4E5968; line-height: 1.5;
  }
  .grid-badge {
    position: absolute; top: 4px; left: 4px;
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    border-radius: 3px; padding: 1px 4px;
  }
  .grid-badge svg { width: 10px; height: 10px; fill: #fff; }
  .multi-badge {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.5); border-radius: 3px; padding: 1px 5px;
  }
  .multi-badge svg { width: 12px; height: 12px; fill: #fff; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid #E5E8EB;
    display: flex; padding: 8px 0 28px;
  }
  .nav-item {
    flex: 1; text-align: center; font-size: 10px; color: #8B95A1;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .nav-item.active .nav-icon {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-item.active { color: #00D2C8; font-weight: 700; }
  .nav-icon { font-size: 22px; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <div class="status-icons">
    <span class="signal">●●●●</span>
    <span style="font-size:14px">📶</span>
    <div class="battery"><div class="battery-fill"></div></div>
  </div>
</div>

<!-- AppBar -->
<div class="app-bar">피드</div>

<!-- Profile Header -->
<div class="profile-header">
  <div class="profile-row">
    <div class="group-icon">👥</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">12</div><div class="stat-label">게시물</div></div>
      <div class="stat"><div class="stat-num">4</div><div class="stat-label">투표</div></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">멤버</div></div>
    </div>
  </div>
  <div class="group-name">등산 좋아하는 사람들 🏔️</div>
  <div class="group-role">회장</div>
</div>

<!-- Action Buttons -->
<div class="action-row">
  <div class="action-btn">
    <span class="icon">✏️</span> 게시물 작성
  </div>
  <div class="action-btn">
    <span class="icon">📊</span> 투표 만들기
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab active">📷</div>
  <div class="tab">☑️ 투표</div>
</div>

<!-- Feed Grid -->
<div class="grid">
  <div class="grid-item">
    <div class="placeholder ph-blue" style="font-size:24px">🏔️</div>
    <div class="grid-badge"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4h7.6l-6.2 4.5 2.4 7.4-6.2-4.5-6.2 4.5 2.4-7.4-6.2-4.5h7.6z"/></svg></div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-green" style="font-size:24px">🌲</div>
    <div class="multi-badge"><svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z" fill="none" stroke="#fff" stroke-width="2"/><path d="M8 6h12v12H8z" fill="none" stroke="#fff" stroke-width="2"/></svg></div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-text">다음 주 토요일 북한산 정기 모임입니다! 참석 가능하신 분 댓글 남겨주세요 🙋</div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-pink" style="font-size:24px">🌸</div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-yellow" style="font-size:24px">⛺</div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-purple" style="font-size:24px">🎒</div>
    <div class="multi-badge"><svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z" fill="none" stroke="#fff" stroke-width="2"/><path d="M8 6h12v12H8z" fill="none" stroke="#fff" stroke-width="2"/></svg></div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-text">지난 주말 관악산 후기입니다! 날씨가 정말 좋았어요 ☀️</div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-teal" style="font-size:24px">🏕️</div>
  </div>
  <div class="grid-item">
    <div class="placeholder ph-green" style="font-size:24px">🥾</div>
  </div>
</div>

</body>
</html>
