<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    width: 1290px; height: 2796px;
    background: #F8F9FA;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  .caption {
    padding-top: 160px; text-align: center; margin-bottom: 80px;
  }
  .caption h1 {
    font-size: 72px; font-weight: 800; color: #191F28;
    letter-spacing: -2px; line-height: 1.3;
  }
  .caption p {
    font-size: 36px; color: #8B95A1; font-weight: 500;
    margin-top: 16px;
  }

  .phone {
    width: 920px;
    background: #fff;
    border-radius: 60px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    border: 3px solid #E5E8EB;
    position: relative;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px 12px; font-size: 28px; font-weight: 600;
    background: #fff;
  }
  .status-icons { display: flex; gap: 10px; align-items: center; font-size: 24px; }

  .app-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 36px 20px; font-size: 34px; font-weight: 700;
    background: #fff;
  }
  .app-bar-left { display: flex; align-items: center; gap: 16px; }
  .app-bar-right { display: flex; align-items: center; gap: 24px; font-size: 32px; }

  .section-title {
    font-size: 38px; font-weight: 800; color: #191F28;
    padding: 8px 36px 4px; background: #fff;
  }

  .month-nav {
    display: flex; align-items: center; justify-content: center; gap: 32px;
    padding: 20px 0 24px; font-size: 32px; font-weight: 700; color: #191F28;
    background: #fff;
  }
  .month-arrow { color: #8B95A1; font-size: 28px; }

  .calendar {
    padding: 0 28px 16px; background: #fff;
  }
  .cal-header {
    display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    font-size: 24px; font-weight: 600; color: #8B95A1; margin-bottom: 12px;
  }
  .cal-header span:first-child { color: #EF4444; }
  .cal-header span:last-child { color: #3182F6; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    row-gap: 6px;
  }
  .cal-day {
    height: 80px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; font-size: 28px; font-weight: 600; color: #191F28;
    position: relative;
  }
  .cal-day.empty { visibility: hidden; }
  .cal-day.sun { color: #EF4444; }
  .cal-day.sat { color: #3182F6; }
  .cal-day.today .day-num {
    width: 56px; height: 56px; border-radius: 50%; background: #00D2C8;
    color: #fff; display: flex; align-items: center; justify-content: center;
  }
  .cal-day.selected .day-num {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    color: #fff; display: flex; align-items: center; justify-content: center;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    position: absolute; bottom: 4px;
  }
  .dot.blue { background: #3182F6; }
  .dot.pink { background: #F06595; }

  .event-section {
    padding: 24px 32px; background: #F8F9FA;
  }
  .event-date {
    font-size: 28px; font-weight: 700; color: #191F28; margin-bottom: 20px;
  }
  .event-card {
    background: #fff; border-radius: 20px; padding: 28px 28px;
    border-left: 6px solid #00D2C8;
  }
  .event-top {
    display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
  }
  .event-badge {
    background: rgba(0,210,200,0.12); color: #00D2C8;
    border-radius: 12px; padding: 6px 16px; font-size: 22px; font-weight: 700;
  }
  .event-time { font-size: 24px; color: #8B95A1; font-weight: 600; }
  .event-name { font-size: 30px; font-weight: 700; margin-bottom: 8px; }
  .event-loc { font-size: 26px; color: #8B95A1; margin-bottom: 4px; }
  .event-desc { font-size: 24px; color: #8B95A1; }

  .fab {
    position: absolute; bottom: 130px; right: 36px;
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    color: #fff; font-size: 44px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(49,130,246,0.3);
  }

  .bottom-nav {
    display: flex; justify-content: space-around; align-items: center;
    padding: 16px 0 28px; background: #fff;
    border-top: 1px solid #E5E8EB;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .nav-icon {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .nav-icon.active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    color: #fff;
  }
  .nav-label { font-size: 20px; color: #8B95A1; font-weight: 600; }
  .nav-label.active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="caption">
  <h1>일정 놓치지 않게</h1>
  <p>정기모임 · 회비일 · 경조사</p>
</div>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">
    <div class="app-bar-left">
      <span style="font-size:30px;">←</span>
      <span>한국고 32기 동창회</span>
    </div>
    <div class="app-bar-right">
      <span>🔔</span>
      <span>⚙️</span>
    </div>
  </div>

  <div class="section-title">일정</div>

  <div class="month-nav">
    <span class="month-arrow">‹</span>
    <span>2026년 6월</span>
    <span class="month-arrow">›</span>
  </div>

  <div class="calendar">
    <div class="cal-header">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="cal-grid">
      <!-- Row 1: June 2026 starts on Monday -->
      <div class="cal-day empty"></div>
      <div class="cal-day">1</div>
      <div class="cal-day">2</div>
      <div class="cal-day">3</div>
      <div class="cal-day">4</div>
      <div class="cal-day">5</div>
      <div class="cal-day sat">6</div>
      <!-- Row 2 -->
      <div class="cal-day sun">7</div>
      <div class="cal-day"><span>8</span><div class="dot pink"></div></div>
      <div class="cal-day today"><div class="day-num">9</div></div>
      <div class="cal-day">10</div>
      <div class="cal-day">11</div>
      <div class="cal-day">12</div>
      <div class="cal-day sat selected"><div class="day-num">13</div><div class="dot blue"></div></div>
      <!-- Row 3 -->
      <div class="cal-day sun">14</div>
      <div class="cal-day">15</div>
      <div class="cal-day"><span>16</span><div class="dot pink"></div></div>
      <div class="cal-day">17</div>
      <div class="cal-day">18</div>
      <div class="cal-day">19</div>
      <div class="cal-day sat">20</div>
      <!-- Row 4 -->
      <div class="cal-day sun">21</div>
      <div class="cal-day">22</div>
      <div class="cal-day">23</div>
      <div class="cal-day">24</div>
      <div class="cal-day">25</div>
      <div class="cal-day">26</div>
      <div class="cal-day sat">27</div>
      <!-- Row 5 -->
      <div class="cal-day sun">28</div>
      <div class="cal-day">29</div>
      <div class="cal-day">30</div>
      <div class="cal-day empty"></div>
      <div class="cal-day empty"></div>
      <div class="cal-day empty"></div>
      <div class="cal-day empty"></div>
    </div>
  </div>

  <div class="event-section">
    <div class="event-date">6월 13일 &nbsp;1개의 일정</div>
    <div class="event-card">
      <div class="event-top">
        <span class="event-badge">정기모임</span>
        <span class="event-time">10:00</span>
      </div>
      <div class="event-name">한국고 32기 동창회 정기모임</div>
      <div class="event-loc">📍 00공원 주차장</div>
      <div class="event-desc">주차장에서 모인 뒤 다같이 이동합니다</div>
    </div>
  </div>

  <div class="fab">+</div>

  <div class="bottom-nav">
    <div class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">홈</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📢</div>
      <span class="nav-label">소식</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📷</div>
      <span class="nav-label">피드</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon active">📅</div>
      <span class="nav-label active">캘린더</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">💰</div>
      <span class="nav-label">회비</span>
    </div>
  </div>
</div>

</body>
</html>
