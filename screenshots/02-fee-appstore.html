<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    width: 1290px; height: 2796px;
    background: #F8F9FA;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  .caption {
    padding-top: 80px; text-align: center; margin-bottom: 40px;
  }
  .caption h1 {
    font-size: 64px; font-weight: 800; color: #191F28;
    letter-spacing: -2px; line-height: 1.3;
  }
  .caption p {
    font-size: 32px; color: #8B95A1; font-weight: 500;
    margin-top: 16px;
  }

  .phone {
    width: 1020px;
    background: #fff;
    border-radius: 60px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
    border: 3px solid #E5E8EB;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px 12px; font-size: 28px; font-weight: 600;
    background: #fff;
  }
  .status-icons { display: flex; gap: 10px; align-items: center; font-size: 24px; }

  .app-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 36px 20px; font-size: 34px; font-weight: 700;
    background: #fff;
  }
  .app-bar-left { display: flex; align-items: center; gap: 16px; }
  .app-bar-right { display: flex; align-items: center; gap: 24px; font-size: 32px; }

  .content { padding: 0 32px 32px; background: #F8F9FA; }

  .month-nav {
    display: flex; align-items: center; justify-content: center; gap: 32px;
    padding: 24px 0 28px; font-size: 32px; font-weight: 700; color: #191F28;
    background: #F8F9FA;
  }
  .month-arrow { color: #8B95A1; font-size: 28px; cursor: pointer; }

  .stats-card {
    background: #fff; border-radius: 24px; padding: 32px 24px; margin-bottom: 20px;
    display: flex; justify-content: space-around; text-align: center;
  }
  .stat-item {}
  .stat-num { font-size: 40px; font-weight: 800; }
  .stat-num.teal { color: #00D2C8; }
  .stat-num.orange { color: #F59E0B; }
  .stat-num.red { color: #EF4444; }
  .stat-num.blue { color: #3182F6; }
  .stat-label { font-size: 24px; color: #8B95A1; margin-top: 6px; font-weight: 600; }

  .progress-section {
    background: #fff; border-radius: 24px; padding: 28px 28px; margin-bottom: 20px;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .progress-text { font-size: 26px; color: #8B95A1; font-weight: 600; }
  .progress-percent { font-size: 32px; font-weight: 800; color: #191F28; }
  .progress-bar {
    height: 20px; background: #F2F4F6; border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 75%; border-radius: 10px;
    background: linear-gradient(90deg, #00D2C8, #34D399);
  }

  .amount-card {
    background: #fff; border-radius: 24px; padding: 28px 28px; margin-bottom: 20px;
  }
  .amount-label { font-size: 26px; color: #8B95A1; font-weight: 600; }
  .amount-value { font-size: 34px; font-weight: 800; color: #00D2C8; margin-top: 8px; }
  .amount-total { color: #8B95A1; font-weight: 600; }

  .btn-row { display: flex; gap: 16px; margin-bottom: 16px; }
  .btn-outlined {
    flex: 1; height: 80px; border-radius: 20px;
    border: 2px solid #E5E8EB; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 26px; font-weight: 600; color: #191F28;
  }
  .btn-full {
    width: 100%; height: 80px; border-radius: 20px;
    border: 2px solid #E5E8EB; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 26px; font-weight: 600; color: #191F28;
  }

  .bottom-nav {
    display: flex; justify-content: space-around; align-items: center;
    padding: 16px 0 28px; background: #fff;
    border-top: 1px solid #E5E8EB;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .nav-icon {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .nav-icon.active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    color: #fff;
  }
  .nav-label { font-size: 20px; color: #8B95A1; font-weight: 600; }
  .nav-label.active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="caption">
  <h1>회비 관리, 깔끔하게</h1>
  <p>납부 현황 한눈에 · 장부 · 고지서</p>
</div>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">
    <div class="app-bar-left">
      <span style="font-size:30px;">←</span>
      <span>한국고 32기 동창회</span>
    </div>
    <div class="app-bar-right">
      <span>🔔</span>
      <span>⚙️</span>
    </div>
  </div>

  <div class="month-nav">
    <span class="month-arrow">‹</span>
    <span>2026년 6월</span>
    <span class="month-arrow">›</span>
  </div>

  <div class="content">
    <div class="stats-card">
      <div class="stat-item">
        <div class="stat-num teal">6</div>
        <div class="stat-label">납부</div>
      </div>
      <div class="stat-item">
        <div class="stat-num orange">1</div>
        <div class="stat-label">확인중</div>
      </div>
      <div class="stat-item">
        <div class="stat-num red">1</div>
        <div class="stat-label">미납</div>
      </div>
      <div class="stat-item">
        <div class="stat-num blue">8</div>
        <div class="stat-label">전체</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-text">납부 6 / 전체 8명</span>
        <span class="progress-percent">75%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="amount-card">
      <div class="amount-label">걷은 금액</div>
      <div class="amount-value">600,000원 <span class="amount-total">/ 800,000원</span></div>
    </div>

    <div class="btn-row">
      <div class="btn-outlined">📋 장부</div>
      <div class="btn-outlined">▶ 고지서</div>
    </div>

    <div class="btn-full">📊 회원 납부 현황 상세</div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">홈</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📢</div>
      <span class="nav-label">소식</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📷</div>
      <span class="nav-label">피드</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">캘린더</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon active">💰</div>
      <span class="nav-label active">회비</span>
    </div>
  </div>
</div>

</body>
</html>
