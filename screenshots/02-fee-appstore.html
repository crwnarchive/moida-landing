<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Pretendard Variable',-apple-system,sans-serif;
    width:1290px;height:2796px;
    background:linear-gradient(175deg, #10082B 0%, #1A0E45 40%, #2B1869 100%);
    display:flex;flex-direction:column;align-items:center;
    overflow:hidden;position:relative;
  }
  body::before{
    content:'';position:absolute;width:800px;height:800px;
    top:900px;left:50%;transform:translateX(-50%);
    background:radial-gradient(circle,#8B5CF6 0%,transparent 70%);
    filter:blur(80px);opacity:0.2;z-index:0;pointer-events:none;
  }
  .caption{padding-top:100px;text-align:center;margin-bottom:48px;position:relative;z-index:1}
  .tag{
    display:inline-block;background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;padding:8px 24px;font-size:26px;font-weight:500;
    color:rgba(255,255,255,0.6);margin-bottom:24px;letter-spacing:0.03em;
  }
  .caption h1{
    font-size:68px;font-weight:800;letter-spacing:-2px;line-height:1.3;
    background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.75) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .caption p{font-size:30px;color:rgba(255,255,255,0.45);font-weight:400;margin-top:16px;letter-spacing:-0.5px}
  .phone{
    width:1040px;background:#fff;border-radius:56px;
    box-shadow:0 20px 80px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.06),0 0 160px #8B5CF622;
    overflow:hidden;position:relative;z-index:1;
  }
  .dynamic-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:160px;height:40px;background:#000;border-radius:24px;z-index:10}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:24px 44px 10px;font-size:28px;font-weight:600;background:#fff}
  .status-icons{display:flex;gap:8px;align-items:center}
  .status-icons svg{width:28px;height:28px}
  .app-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 36px 16px;font-size:34px;font-weight:700;background:#fff}
  .app-bar-left{display:flex;align-items:center;gap:16px}
  .app-bar-right{display:flex;align-items:center;gap:24px;font-size:32px}
  .content{padding:0 32px 32px;background:#F5F5F7}
  .banner{background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);border-radius:24px;padding:36px 32px;color:#fff;margin-bottom:20px}
  .banner-title{font-size:34px;font-weight:800}
  .banner-row{display:flex;align-items:center;gap:12px;margin-top:12px}
  .badge-chongmu{background:rgba(255,255,255,0.25);border-radius:20px;padding:6px 16px;font-size:22px;font-weight:700}
  .banner-members{font-size:26px;opacity:0.9}
  .card{background:#fff;border-radius:24px;padding:28px 28px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .card-title{font-size:28px;font-weight:700;color:#191F28}
  .card-more{font-size:24px;color:#3182F6;font-weight:600}
  .fee-card{display:flex;align-items:center;justify-content:space-between}
  .fee-label{font-size:26px;color:#8B95A1}
  .fee-value{font-size:30px;font-weight:700;color:#00D2C8;margin-top:4px}
  .fee-arrow{font-size:28px;color:#8B95A1}
  .notice-item{display:flex;justify-content:space-between;align-items:center}
  .notice-title{font-size:28px;font-weight:600}
  .notice-date{font-size:24px;color:#8B95A1}
  .notice-accent{width:5px;height:40px;background:linear-gradient(180deg,#00D2C8,#3182F6);border-radius:3px;margin-right:16px}
  .schedule-item{display:flex;align-items:center;gap:20px;padding:10px 0}
  .schedule-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff}
  .schedule-circle.blue{background:linear-gradient(135deg,#3182F6,#60a5fa)}
  .schedule-circle.pink{background:linear-gradient(135deg,#ec4899,#f472b6)}
  .schedule-info{flex:1}
  .schedule-name{font-size:28px;font-weight:600}
  .schedule-date{font-size:24px;color:#8B95A1;margin-top:2px}
  .event-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
  .event-name{font-size:28px;font-weight:600}
  .event-type{font-size:24px;color:#8B95A1;margin-top:2px}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:32px;padding:24px 0 28px;font-size:32px;font-weight:700;color:#191F28;background:#F5F5F7}
  .month-arrow{color:#8B95A1;font-size:28px}
  .stats-card{background:#fff;border-radius:24px;padding:32px 24px;margin-bottom:20px;display:flex;justify-content:space-around;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .stat-num{font-size:40px;font-weight:800}
  .stat-num.teal{color:#00D2C8}.stat-num.orange{color:#F59E0B}.stat-num.red{color:#EF4444}.stat-num.blue{color:#3182F6}
  .stat-label{font-size:24px;color:#8B95A1;margin-top:6px;font-weight:600}
  .progress-section{background:#fff;border-radius:24px;padding:28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .progress-text{font-size:26px;color:#8B95A1;font-weight:600}
  .progress-percent{font-size:32px;font-weight:800;color:#191F28}
  .progress-bar{height:20px;background:#F2F4F6;border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;width:75%;border-radius:10px;background:linear-gradient(90deg,#00D2C8,#3182F6)}
  .amount-card{background:#fff;border-radius:24px;padding:28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .amount-label{font-size:26px;color:#8B95A1;font-weight:600}
  .amount-value{font-size:34px;font-weight:800;color:#00D2C8;margin-top:8px}
  .amount-total{color:#8B95A1;font-weight:600}
  .btn-row{display:flex;gap:16px;margin-bottom:16px}
  .btn-outlined{flex:1;height:80px;border-radius:20px;border:2px solid #E5E8EB;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-size:26px;font-weight:600;color:#191F28;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .btn-full{width:100%;height:80px;border-radius:20px;border:2px solid #E5E8EB;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-size:26px;font-weight:600;color:#191F28;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .feed-post{background:#fff;border-radius:24px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .feed-header{display:flex;align-items:center;padding:24px 28px 16px;gap:16px}
  .feed-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#00D2C8,#3182F6);flex-shrink:0}
  .feed-avatar.purple{background:linear-gradient(135deg,#8B5CF6,#a78bfa)}
  .feed-name{font-size:28px;font-weight:700;color:#191F28}
  .feed-time{font-size:22px;color:#8B95A1}
  .feed-body{padding:0 28px 20px;font-size:28px;color:#333D4B;line-height:1.6}
  .feed-img{width:calc(100% - 56px);margin:0 28px 16px;height:200px;border-radius:16px}
  .feed-actions{display:flex;padding:4px 28px 20px;gap:28px}
  .feed-action{font-size:24px;color:#8B95A1;display:flex;align-items:center;gap:8px}
  .poll-card{background:#fff;border-radius:24px;padding:28px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .poll-question{font-size:30px;font-weight:700;color:#191F28;margin-bottom:20px}
  .poll-option{background:#F5F5F7;border-radius:16px;padding:20px 24px;margin-bottom:12px;position:relative;overflow:hidden}
  .poll-option-fill{position:absolute;left:0;top:0;bottom:0;border-radius:16px}
  .poll-option-text{position:relative;z-index:1;display:flex;justify-content:space-between;font-size:26px;font-weight:600;color:#333D4B}
  .poll-meta{font-size:22px;color:#8B95A1;margin-top:12px}
  .cal-month{text-align:center;font-size:32px;font-weight:700;color:#191F28;padding:16px 0 10px}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);padding:0 28px;text-align:center;font-size:22px;color:#8B95A1;margin-bottom:4px;font-weight:600}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 28px;text-align:center;font-size:26px}
  .cal-cell{padding:12px 4px;color:#333D4B;position:relative}
  .cal-cell.today{font-weight:800;color:#3182F6}
  .cal-cell .dot{width:8px;height:8px;border-radius:50%;margin:4px auto 0}
  .cal-cell .dot.blue{background:#3182F6}.cal-cell .dot.red{background:#ef4444}.cal-cell .dot.green{background:#10b981}
  .cal-event{display:flex;align-items:center;padding:16px 20px;margin:6px 28px;background:#fff;border-radius:16px;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .cal-event-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .cal-event-name{font-size:26px;font-weight:600;color:#333D4B}
  .cal-event-date{font-size:22px;color:#8B95A1}
  .ledger-summary{display:flex;gap:16px;margin-bottom:20px}
  .ledger-box{flex:1;background:#fff;border-radius:24px;padding:28px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .ledger-label{font-size:24px;color:#8B95A1;margin-bottom:8px;font-weight:600}
  .ledger-amount{font-size:32px;font-weight:800}
  .ledger-amount.blue{color:#3182F6}.ledger-amount.red{color:#ef4444}.ledger-amount.green{color:#10b981}
  .ledger-row{display:flex;align-items:center;padding:18px 0;border-bottom:1px solid #F2F4F6}
  .ledger-row:last-child{border-bottom:none}
  .ledger-row-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-right:16px;font-size:28px}
  .ledger-row-text{flex:1}
  .ledger-row-title{font-size:26px;font-weight:600;color:#333D4B}
  .ledger-row-date{font-size:22px;color:#8B95A1;margin-top:2px}
  .ledger-row-amount{font-size:28px;font-weight:700}
  .bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:20px 0 36px;background:#fff;border-top:1px solid #E5E8EB}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .nav-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px}
  .nav-icon.active{background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);color:#fff}
  .nav-label{font-size:22px;color:#8B95A1;font-weight:600}
  .nav-label.active{background:linear-gradient(135deg,#00D2C8,#3182F6,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
</style>
</head>
<body>

<div class="caption">
  <div class="tag">회비 관리</div>
  <h1>회비 관리, 깔끔하게</h1>
  <p>납부 현황 한눈에 · 장부 · 고지서</p>
</div>

<div class="phone">
  <div class="dynamic-island"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 20 14" fill="#000"><rect x="0" y="9" width="4" height="5" rx="1"/><rect x="5" y="6" width="4" height="8" rx="1"/><rect x="10" y="3" width="4" height="11" rx="1"/><rect x="15" y="0" width="4" height="14" rx="1"/></svg>
      <svg viewBox="0 0 24 12" fill="none"><rect x=".5" y=".5" width="20" height="11" rx="2.5" stroke="#000" stroke-width="1.2"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.5" fill="#000"/><path d="M22 4v4a2.5 2.5 0 000-4z" fill="#000"/></svg>
    </div>
  </div>

  <div class="app-bar">
    <div class="app-bar-left"><span style="font-size:30px">←</span><span>한국고 32기 동창회</span></div>
    <div class="app-bar-right"><span>🔔</span><span>⚙️</span></div>
  </div>
  <div class="month-nav"><span class="month-arrow">‹</span><span>2026년 6월</span><span class="month-arrow">›</span></div>
  <div class="content">
    <div class="stats-card">
      <div><div class="stat-num teal">6</div><div class="stat-label">납부</div></div>
      <div><div class="stat-num orange">1</div><div class="stat-label">확인중</div></div>
      <div><div class="stat-num red">1</div><div class="stat-label">미납</div></div>
      <div><div class="stat-num blue">8</div><div class="stat-label">전체</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-header"><span class="progress-text">납부 6 / 전체 8명</span><span class="progress-percent">75%</span></div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
    <div class="amount-card"><div class="amount-label">걷은 금액</div><div class="amount-value">600,000원 <span class="amount-total">/ 800,000원</span></div></div>
    <div class="btn-row"><div class="btn-outlined">📋 장부</div><div class="btn-outlined">▶ 고지서</div></div>
    <div class="btn-full">📊 회원 납부 현황 상세</div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item"><div class="nav-icon">🏠</div><span class="nav-label">홈</span></div>
    <div class="nav-item"><div class="nav-icon">📢</div><span class="nav-label">소식</span></div>
    <div class="nav-item"><div class="nav-icon">📰</div><span class="nav-label">피드</span></div>
    <div class="nav-item"><div class="nav-icon">📅</div><span class="nav-label">캘린더</span></div>
    <div class="nav-item"><div class="nav-icon active">💰</div><span class="nav-label active">회비</span></div>
  </div>
</div>

</body>
</html>
