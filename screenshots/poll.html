<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #F8F9FA;
    width: 393px;
    min-height: 852px;
    overflow: hidden;
    color: #191F28;
    -webkit-font-smoothing: antialiased;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 8px;
    font-size: 16px; font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .battery { width: 27px; height: 13px; border: 1.5px solid #191F28; border-radius: 3px; position: relative; }
  .battery::after { content:''; position: absolute; right: -5px; top: 3px; width: 2px; height: 5px; background: #191F28; border-radius: 0 1px 1px 0; }
  .battery-fill { width: 85%; height: 100%; background: #191F28; border-radius: 1px; }

  .app-bar { padding: 8px 20px 12px; font-size: 18px; font-weight: 700; }

  /* Profile header (compact) */
  .profile-header { padding: 12px 20px 0; }
  .profile-row { display: flex; align-items: center; gap: 20px; }
  .group-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,210,200,0.12), rgba(49,130,246,0.12), rgba(139,92,246,0.12));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .stats-row { display: flex; flex: 1; justify-content: space-evenly; }
  .stat { text-align: center; }
  .stat-num { font-size: 18px; font-weight: 800; }
  .stat-label { font-size: 13px; color: #8B95A1; }
  .group-name { font-size: 16px; font-weight: 600; margin-top: 12px; }
  .group-role { font-size: 14px; color: #8B95A1; margin-top: 2px; }

  .action-row { display: flex; gap: 10px; padding: 16px 20px 8px; }
  .action-btn {
    flex: 1; height: 44px; border-radius: 12px;
    border: 1px solid #E5E8EB; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 14px; font-weight: 600;
  }

  .tab-bar {
    display: flex; border-bottom: 1px solid #E5E8EB; background: #F8F9FA;
  }
  .tab {
    flex: 1; text-align: center; padding: 12px 0;
    font-size: 14px; font-weight: 600; color: #8B95A1;
    position: relative;
  }
  .tab.active { color: #191F28; }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2.5px; background: #00D2C8; border-radius: 2px;
  }

  /* Poll list */
  .poll-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  .poll-card {
    background: #fff; border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .poll-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .poll-icon.active {
    background: linear-gradient(135deg, rgba(0,210,200,0.12), rgba(49,130,246,0.12), rgba(139,92,246,0.12));
  }
  .poll-icon.closed { background: #E5E8EB; }
  .poll-info { flex: 1; }
  .poll-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .poll-title.closed { color: #8B95A1; }
  .poll-count { font-size: 13px; color: #8B95A1; margin-top: 2px; }
  .poll-badge {
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .badge-active {
    background: linear-gradient(135deg, #00D2C8, #3182F6, #8B5CF6);
  }
  .badge-closed { background: #E5E8EB; color: #8B95A1; }
</style>
</head>
<body>

<div class="status-bar">
  <span>9:41</span>
  <div class="status-icons">
    <span style="font-size:13px">●●●●</span>
    <span style="font-size:14px">📶</span>
    <div class="battery"><div class="battery-fill"></div></div>
  </div>
</div>

<div class="app-bar">피드</div>

<div class="profile-header">
  <div class="profile-row">
    <div class="group-icon">👥</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">12</div><div class="stat-label">게시물</div></div>
      <div class="stat"><div class="stat-num">4</div><div class="stat-label">투표</div></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">멤버</div></div>
    </div>
  </div>
  <div class="group-name">등산 좋아하는 사람들 🏔️</div>
  <div class="group-role">회장</div>
</div>

<div class="action-row">
  <div class="action-btn">✏️ 게시물 작성</div>
  <div class="action-btn">📊 투표 만들기</div>
</div>

<div class="tab-bar">
  <div class="tab">📷</div>
  <div class="tab active">☑️ 투표</div>
</div>

<div class="poll-list">
  <div class="poll-card">
    <div class="poll-icon active">📊</div>
    <div class="poll-info">
      <div class="poll-title">다음 모임 장소 투표</div>
      <div class="poll-count">12명 참여</div>
    </div>
    <div class="poll-badge badge-active">진행중</div>
  </div>

  <div class="poll-card">
    <div class="poll-icon active">📊</div>
    <div class="poll-info">
      <div class="poll-title">7월 정기모임 날짜</div>
      <div class="poll-count">8명 참여</div>
    </div>
    <div class="poll-badge badge-active">진행중</div>
  </div>

  <div class="poll-card">
    <div class="poll-icon active">📊</div>
    <div class="poll-info">
      <div class="poll-title">회비 사용 항목 (복수 선택)</div>
      <div class="poll-count">15명 참여</div>
    </div>
    <div class="poll-badge badge-active">진행중</div>
  </div>

  <div class="poll-card">
    <div class="poll-icon closed">📊</div>
    <div class="poll-info">
      <div class="poll-title closed">6월 등산 코스 투표</div>
      <div class="poll-count">10명 참여</div>
    </div>
    <div class="poll-badge badge-closed">마감</div>
  </div>
</div>

</body>
</html>
